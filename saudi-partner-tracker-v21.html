<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Inter',system-ui,sans-serif;background:#2A0726;color:#F5E8F3;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.theme-light{--sp-bg:#FFFFFF;--sp-surface:#FFFFFF;--sp-surface2:#F6F6F6;--sp-surface3:#EBEBEB;--sp-text:#4B4B4B;--sp-sub:#7C7C7C;--sp-faint:#B5B5B5;--sp-line:#EBEBEB;--sp-lineStrong:#D8D8D8;
  --sp-brand:#78006E;--sp-accent:#646EC8;--sp-blue:#64A0DC;--sp-blueSoft:#D8E7F6;--sp-blueText:#4B7FB5;
  --sp-up:#3CA06E;--sp-upBg:#CEE7DB;--sp-down:#FF4664;--sp-downBg:#FFD1D8;
  --sp-headerBg:#78006E;--sp-headerText:#FFFFFF;--sp-headerSub:#DDBFDB;--sp-headerLine:#9A4092;--sp-tabIdle:#DDBFDB;
  --sp-shadow:0 1px 5px rgba(75,75,75,0.08);--sp-shadowLg:0 6px 24px rgba(75,75,75,0.14)}
.theme-dark{--sp-bg:#150312;--sp-surface:#220720;--sp-surface2:#2B0A28;--sp-surface3:#351033;--sp-text:#F5E8F3;--sp-sub:#B08AAB;--sp-faint:#7E5A79;--sp-line:#3E1439;--sp-lineStrong:#552050;
  --sp-brand:#E58BD4;--sp-accent:#E58BD4;--sp-blue:#7FB3E8;--sp-blueSoft:#1D3550;--sp-blueText:#9CC6F0;
  --sp-up:#3ED598;--sp-upBg:#0E3326;--sp-down:#FF7B7B;--sp-downBg:#3D1414;
  --sp-headerBg:#1D051A;--sp-headerText:#FFFFFF;--sp-headerSub:#B08AAB;--sp-headerLine:#381033;--sp-tabIdle:#9A7794;
  --sp-shadow:0 2px 10px rgba(0,0,0,0.35);--sp-shadowLg:0 10px 32px rgba(0,0,0,0.45)}
select,input{font-family:'Inter',system-ui,sans-serif;font-size:13px;color:var(--sp-text);background:var(--sp-surface);border:1.5px solid var(--sp-line);border-radius:9px;outline:none;padding:8px 12px;transition:border-color .15s,box-shadow .15s,background .15s}
select:hover,input:hover{border-color:var(--sp-lineStrong)}
select:focus,input:focus{border-color:var(--sp-accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--sp-accent) 18%,transparent)}
textarea{font-family:'Inter',system-ui,sans-serif;font-size:13px;color:var(--sp-text);background:var(--sp-surface);border:1.5px solid var(--sp-line);border-radius:10px;outline:none;padding:11px 14px;resize:vertical;line-height:1.65;width:100%;transition:border-color .15s,box-shadow .15s}
textarea:focus{border-color:var(--sp-accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--sp-accent) 18%,transparent)}
button{font-family:'Inter',system-ui,sans-serif;cursor:pointer;border:none;background:none;transition:all .15s}
button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--sp-accent);outline-offset:2px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sp-lineStrong);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--sp-faint)}
.page-wrap{background:var(--sp-bg);min-height:calc(100vh - 62px);color:var(--sp-text)}
.sp-card{background:var(--sp-surface);border:1px solid var(--sp-line);border-radius:14px;box-shadow:var(--sp-shadow)}
table{border-collapse:collapse}
table tbody tr{transition:background .12s}
table tbody tr:hover{background:var(--sp-surface2)}
option{background:var(--sp-surface);color:var(--sp-text)}
.sp-display{font-family:'Playfair Display',Georgia,serif!important}
.nav-item{position:relative}
.nav-tip{position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:#4B4B4B;color:#fff;font-size:12px;font-weight:600;padding:6px 13px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;z-index:80;box-shadow:0 4px 14px rgba(0,0,0,0.28)}
.nav-item:hover .nav-tip{opacity:1}
.sp-card{transition:box-shadow .18s ease, transform .18s ease}
.sp-card:hover{box-shadow:var(--sp-shadowLg)}
tbody tr>td{transition:background .12s}
tbody tr:hover>td{background:rgba(120,0,110,0.035)}
button{cursor:pointer}
.fade-in{animation:spFade .22s ease}
@keyframes spFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.drawer-panel{animation:spSlide .22s ease}
@keyframes spSlide{from{transform:translateX(46px);opacity:0}to{transform:none;opacity:1}}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(120,0,110,0.22);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
input[type=date]{padding:6px 8px;font-size:12px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

/* ─── AUTH ───────────────────────────────────────────────────────────────────*/
const APP_PASSWORD = "STA@2026";

function LoginScreen({onLogin}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState(false);
  const[show,setShow]=useState(false);
  const submit=()=>{if(pw===APP_PASSWORD){sessionStorage.setItem("sp_auth","1");onLogin();}else{setErr(true);setTimeout(()=>setErr(false),2000);}};
  return(
    <div style={{minHeight:"100vh",background:"#78006E",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{position:"absolute",left:0,right:0,bottom:0,height:22,backgroundImage:`url(data:image/png;base64,${ASSET_STRIP})`,backgroundSize:"auto 100%",backgroundRepeat:"repeat-x",opacity:0.9}}/>
      <div style={{width:"100%",maxWidth:420,position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <img src={"data:image/png;base64,"+ASSET_LOGO_DARK} alt="Saudi Partner" style={{height:110,marginBottom:24}}/>
          <div className="sp-display" style={{fontSize:26,fontWeight:800,color:"#fff",letterSpacing:"-0.2px",marginBottom:8}}>Platform Product Tracker</div>
          <div style={{fontSize:15,color:"rgba(255,255,255,0.5)",fontWeight:500}}>Product Tracker · Q2 2026</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:36}}>
          <div style={{fontSize:16,fontWeight:600,color:"#fff",marginBottom:6}}>Sign in to continue</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:24}}>Enter your team password to access the tracker</div>
          <div style={{position:"relative",marginBottom:16}}>
            <input
              type={show?"text":"password"}
              value={pw}
              onChange={e=>{setPw(e.target.value);setErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="Enter password"
              style={{width:"100%",padding:"14px 48px 14px 16px",borderRadius:12,border:err?"1.5px solid #ff6b6b":"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:15,outline:"none",fontFamily:"inherit",transition:"all 0.15s"}}
              autoFocus
            />
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.4)",fontSize:14,padding:"4px"}}>
              {show?"Hide":"Show"}
            </button>
          </div>
          {err&&<div style={{color:"#ff6b6b",fontSize:13,marginBottom:12,fontWeight:500}}>Incorrect password. Please try again.</div>}
          <button onClick={submit} style={{width:"100%",padding:"14px",borderRadius:12,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#78006E,#78006E)",border:"none",boxShadow:"0 6px 24px rgba(198,0,126,0.4)",letterSpacing:"0.2px"}}>
            Sign In →
          </button>
          <div style={{textAlign:"center",marginTop:20,fontSize:12,color:"rgba(255,255,255,0.25)"}}>Access restricted to STA Smart Tourism team members</div>
        </div>
      </div>
    </div>
  );
}

const CRIT=[
  {key:"c1",label:"Partner Impact",color:"#646EC8",bg:"#646EC81C",weight:30,desc:"How meaningfully does this improve partner experience?",
   qs:[{key:"q1_1",label:"Evidence of partner pain / need",w:40,opts:[{v:1,l:"No evidence",d:"No data or feedback collected"},{v:2,l:"Anecdotal only",d:"1-2 informal mentions"},{v:3,l:"Support cases",d:"Appears in complaint logs"},{v:4,l:"Survey / interviews",d:"Structured partner research"},{v:5,l:"Usability test + analytics",d:"Both qualitative and quantitative"}]},{key:"q1_2",label:"Breadth of partners affected",w:35,opts:[{v:1,l:"< 5%",d:"Very niche"},{v:2,l:"5-20%",d:"Small defined group"},{v:3,l:"20-50%",d:"Meaningful portion"},{v:4,l:"50-80%",d:"Majority"},{v:5,l:"> 80%",d:"Platform-wide"}]},{key:"q1_3",label:"Severity of friction",w:25,opts:[{v:1,l:"Nice to have",d:"Cosmetic"},{v:2,l:"Minor friction",d:"Can work around"},{v:3,l:"Noticeable drop-off",d:"Measurable disengagement"},{v:4,l:"High frustration",d:"Partners stuck"},{v:5,l:"Blocks core journey",d:"Cannot complete key tasks"}]}]},
  {key:"c2",label:"Business Value",color:"#78006E",bg:"#78006E1C",weight:30,desc:"Strategic alignment, CSAT, spend impact, active user growth.",
   qs:[{key:"q2_1",label:"Strategic alignment",w:25,opts:[{v:1,l:"Not aligned",d:"Outside priorities"},{v:2,l:"Loosely related",d:"Indirect link"},{v:3,l:"Supports a KPI",d:"Linked to tracked metric"},{v:4,l:"Tied to OKR",d:"Explicit owner and goal"},{v:5,l:"Leadership priority",d:"On exec roadmap"}]},{key:"q2_2",label:"CSAT / Complaint impact",w:25,opts:[{v:1,l:"No CSAT impact",d:"Unlikely to affect scores"},{v:2,l:"Minor improvement",d:"Small quality-of-life gain"},{v:3,l:"Reduces complaints",d:"Addresses known category"},{v:4,l:"Significant CSAT lift",d:"Top CSAT detractor"},{v:5,l:"Resolves #1 pain point",d:"Highest-volume complaint"}]},{key:"q2_3",label:"Impact on partner spend",w:25,opts:[{v:1,l:"No spend impact",d:"No effect"},{v:2,l:"Marginal efficiency",d:"Minor savings"},{v:3,l:"Reduces wasted spend",d:"Better budget redirect"},{v:4,l:"Unlocks investment",d:"Increases Saudi spend"},{v:5,l:"Direct spend multiplier",d:"Drives co-marketing"}]},{key:"q2_4",label:"Impact on active users",w:25,opts:[{v:1,l:"No adoption impact",d:"No new users"},{v:2,l:"Marginal uplift",d:"Small activity increase"},{v:3,l:"Moderate adoption gain",d:"New segment or reactivates"},{v:4,l:"Strong adoption driver",d:"Significantly grows base"},{v:5,l:"Platform-wide adoption",d:"Unlocks unreachable segment"}]}]},
  {key:"c3",label:"Effort & Feasibility",color:"#FA783C",bg:"#FA783C1C",weight:20,desc:"How achievable is this? Higher = easier.",
   qs:[{key:"q3_1",label:"Technical complexity",w:40,opts:[{v:5,l:"Config / copy change",d:"No engineering needed"},{v:4,l:"Small build 1-2 wks",d:"Well-scoped"},{v:3,l:"Medium build 1 mo",d:"Some risk"},{v:2,l:"Large build quarter",d:"Architecture changes"},{v:1,l:"Major platform change",d:"Multi-quarter"}]},{key:"q3_2",label:"Dependencies & blockers",w:35,opts:[{v:5,l:"No dependencies",d:"Start immediately"},{v:4,l:"Minor deps",d:"Content only"},{v:3,l:"1 internal dep",d:"One other team"},{v:2,l:"Multiple deps",d:"2+ teams"},{v:1,l:"External blocker",d:"Legal / vendor"}]},{key:"q3_3",label:"Resource availability",w:25,opts:[{v:5,l:"Team ready now",d:"Capacity exists"},{v:4,l:"Next sprint",d:"Light queue"},{v:3,l:"This quarter",d:"Some competition"},{v:2,l:"Capacity limited",d:"Must deprioritize"},{v:1,l:"No capacity",d:"New hire needed"}]}]},
  {key:"c4",label:"Data & Confidence",color:"#3CA06E",bg:"#3CA06E1C",weight:20,desc:"How confident are we in diagnosis and solution?",
   qs:[{key:"q4_1",label:"Research conducted",w:40,opts:[{v:1,l:"No research",d:"Assumption only"},{v:2,l:"Desk research",d:"Secondary sources"},{v:3,l:"Analytics data",d:"Adobe / Metabase"},{v:4,l:"Partner interviews",d:"Qualitative research"},{v:5,l:"Usability test",d:"Moderated study"}]},{key:"q4_2",label:"Clarity of solution",w:35,opts:[{v:1,l:"Problem only",d:"No solution yet"},{v:2,l:"Direction ID'd",d:"General approach"},{v:3,l:"Solution scoped",d:"Requirements written"},{v:4,l:"Designs ready",d:"UX spec approved"},{v:5,l:"Validated solution",d:"Tested with users"}]},{key:"q4_3",label:"Success metric defined",w:25,opts:[{v:1,l:"No metric",d:"No measure of success"},{v:2,l:"Vague goal",d:"Directional only"},{v:3,l:"Metric ID'd",d:"KPI, no baseline"},{v:4,l:"Baseline + target",d:"Before/after defined"},{v:5,l:"In dashboard",d:"Live in analytics"}]}]}
];
const CMAP={};CRIT.forEach(c=>{CMAP[c.key]=c;});
const critScore=(k,a)=>{const c=CMAP[k];if(!c)return 0;let w=0,t=0;c.qs.forEach(q=>{const v=a?.[q.key];if(v){t+=v*q.w;w+=q.w;}});return w?Math.round(t/w*10)/10:0;};
const finalScore=a=>{let w=0,t=0;CRIT.forEach(c=>{const s=critScore(c.key,a);if(s>0){t+=s*c.weight;w+=c.weight;}});return w?Math.round(t/w*10)/10:0;};

/* ─── Data sanitizers: repair values that come back as strings from Sheets ─── */
const _toArray=v=>{
  if(Array.isArray(v))return v;
  if(typeof v==="string"&&v.trim()){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}
  return[];
};
const _toObject=v=>{
  if(v&&typeof v==="object"&&!Array.isArray(v))return v;
  if(typeof v==="string"&&v.trim()){try{const p=JSON.parse(v);return(p&&typeof p==="object"&&!Array.isArray(p))?p:{};}catch(e){return{};}}
  return{};
};
const sanitizeFeature=f=>{
  if(!f||typeof f!=="object")return f;
  return{...f,subtasks:_toArray(f.subtasks),linkedActivities:_toArray(f.linkedActivities),answers:_toObject(f.answers)};
};
const sanitizeActivity=a=>{
  if(!a||typeof a!=="object")return a;
  return{...a,linkedFeatures:_toArray(a.linkedFeatures)};
};

/* ─── Error boundary: catches any component crash and shows a friendly banner ─── */
class SPErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error("[Saudi Partner] Render error:",err,info);}
  reset=()=>this.setState({err:null});
  render(){
    if(this.state.err){
      return(
        <div style={{padding:"40px 24px",maxWidth:640,margin:"20px auto",background:"var(--sp-surface)",border:"2px solid #FF4664",borderRadius:14,color:"var(--sp-text)"}}>
          <div style={{fontSize:28,marginBottom:10}}>⚠️</div>
          <div style={{fontSize:19,fontWeight:800,color:"#FF4664",marginBottom:9}}>Something went wrong on this page</div>
          <div style={{fontSize:13,lineHeight:1.6,marginBottom:12}}>The rest of the app is still fine — this is usually caused by malformed data in Google Sheets (for example, a subtasks or answers cell that isn\'t valid JSON). The most likely cause is that your Apps Script isn\'t parsing JSON columns yet.</div>
          <div style={{fontSize:12,fontFamily:"monospace",background:"#FF46640D",border:"1px solid #FF466433",borderRadius:8,padding:"9px 12px",marginBottom:12,color:"#FF4664",wordBreak:"break-word"}}>{String(this.state.err&&this.state.err.message||this.state.err)}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={this.reset} style={{padding:"8px 16px",borderRadius:9,fontSize:12.5,fontWeight:700,background:"var(--sp-brand)",color:"#fff",border:"none"}}>Try again</button>
            <button onClick={()=>window.location.reload()} style={{padding:"8px 16px",borderRadius:9,fontSize:12.5,fontWeight:700,background:"var(--sp-surface2)",color:"var(--sp-text)",border:"1.5px solid var(--sp-lineStrong)"}}>Reload page</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ─── ROADMAP TAB ─────────────────────────────────────────────────────────── */
const quarterOf=d=>{if(!d)return null;const dt=new Date(d);if(isNaN(dt.getTime()))return null;return`Q${Math.ceil((dt.getMonth()+1)/3)} ${dt.getFullYear()}`;};
function RoadmapTab({roadmap,activities,updRM}){

  // Scored features
  const allFeatures=useMemo(()=>{let r=[];Object.keys(roadmap).forEach(pk=>(roadmap[pk]||[]).forEach(i=>{r.push({...i,pk,score:isPart(i.answers)?finalScore(i.answers):null,itemType:"feature"});}));return r;},[roadmap]);
  // All activities (always shown)
  const allActivities=useMemo(()=>activities.map(a=>({...a,itemType:"activity"})),[activities]);

  const owners=useMemo(()=>[...new Set([...allFeatures.map(i=>i.owner),...allActivities.map(a=>a.owner)].filter(Boolean))],[allFeatures,allActivities]);

  const filteredFeatures=useMemo(()=>allFeatures
    .filter(i=>!!i.start&&!!i.end)
    .map(i=>({...i,quarter:quarterOf(i.start)||i.quarter}))
    .filter(i=>{
      if(fP&&i.pk!==fP)return false;if(fSt&&i.status!==fSt)return false;
      if(fO&&i.owner!==fO)return false;return true;
    }),[allFeatures,fP,fSt,fO]);

  const filteredActivities=useMemo(()=>allActivities
    .filter(a=>!!a.start&&!!a.end)
    .map(a=>({...a,quarter:quarterOf(a.start)||a.quarter}))
    .filter(a=>{
      if(fP&&a.product!==fP)return false;if(fSt&&a.status!==fSt)return false;
      if(fO&&a.owner!==fO)return false;return true;
    }),[allActivities,fP,fSt,fO]);

  const showFeatures=fType==="all"||fType==="features"||fType==="both";

  if(scoring){return <ScorePanel item={scoring} prodKey={scoring.pk} onClose={()=>setScoring(null)} onSave={answers=>{updRM(scoring.pk,scoring.id,{answers,updated:now()});setScoring(null);}}/>;  }

        </div>

    return(
      <div style={{background:"var(--sp-surface2)",border:`1.5px solid ${T?.color||"#646EC8"}33`,borderLeft:`4px solid ${T?.color||"#646EC8"}`,borderRadius:10,padding:"10px 12px",marginBottom:6,boxShadow:"var(--sp-shadow)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
          <span style={{width:18,height:18,borderRadius:5,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700,flexShrink:0}}>{T?.icon||"?"}</span>

/* ─── DASHBOARD TAB ──────────────────────────────────────────────────────── */
const KPI_DEFS=[
  {key:"suppliers",          label:"Suppliers",               group:"network", trend:true},
  {key:"distributors",       label:"Distributors",            group:"network", trend:true},
  {key:"aggregators",        label:"Aggregators",             group:"network", trend:true},
  {key:"directoryBusinesses",label:"Businesses in Directory", group:"network", trend:true},
  {key:"usersSignedUp",      label:"Users Signed Up",         group:"network", trend:true},
  {key:"csat",               label:"CSAT Score",              group:"health", suffix:"/100"},
  {key:"activationRate",     label:"User Activation Rate",    group:"health", suffix:"%"},
  {key:"engagementRate",     label:"Engagement Rate",         group:"health", suffix:"%"},
];
const numOf=v=>{const n=parseFloat(String(v??"").replace(/,/g,""));return isNaN(n)?null:n;};
const fmtNum=v=>{const n=numOf(v);return n===null?"—":n.toLocaleString("en-US",{maximumFractionDigits:1});};

const PERIOD_RANGES={"H1 2026":[0,5],"H2 2026":[6,11],"Full Year 2026":[0,11]};
const rangeValOf=(dashboard,range,key,group)=>{
  const vals=[];for(let i=range[0];i<=range[1];i++){const v=numOf(dashboard[i]?.[key]);if(v!==null)vals.push(v);}
  if(!vals.length)return null;
  return group==="health"?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10:vals[vals.length-1];
};
const rangeTrendOf=(dashboard,range,key)=>{
  let first=null,firstI=-1,last=null,lastI=-1;
  for(let i=range[0];i<=range[1];i++){const v=numOf(dashboard[i]?.[key]);if(v!==null){if(first===null){first=v;firstI=i;}last=v;lastI=i;}}
  if(first===null||firstI===lastI||first===0)return null;
  return{pct:(last-first)/first*100,label:MONTHS_2026[firstI].split(" ")[0]+" → "+MONTHS_2026[lastI].split(" ")[0]};
};

function trendOf(dashboard,midx,key){
  const cur=numOf(dashboard[midx]?.[key]);
  if(cur===null)return null;
  for(let i=midx-1;i>=0;i--){
    const prev=numOf(dashboard[i]?.[key]);
    if(prev!==null){
      if(prev===0)return null;
      return {pct:(cur-prev)/prev*100, prevMonth:MONTHS_2026[i]};
    }
  }
  return null;
}

function Spark({dashboard,midx,keyName,range}){
  const vals=MONTHS_2026.map((_,i)=>numOf(dashboard[i]?.[keyName]));
  const max=Math.max(...vals.map(v=>v??0),1);
  const hot=i=>range?(i>=range[0]&&i<=range[1]):i===midx;
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:2,height:26,marginTop:10}}>
      {vals.map((v,i)=>(
        <div key={i} title={MONTHS_2026[i]+(v!==null?`: ${v.toLocaleString()}`:"")}
          style={{flex:1,minWidth:3,borderRadius:2,
            height:v===null?3:Math.max(3,v/max*26),
            background:hot(i)&&v!==null?"var(--sp-accent)":(v===null?"var(--sp-line)":"var(--sp-blue)"),
            opacity:v===null?0.7:(hot(i)?1:0.55),transition:"height 0.3s"}}/>
      ))}
    </div>
  );
}

function KpiCard({def,dashboard,midx,editing,onChange,range}){
  const d=dashboard[midx]||{};
  const val=range?rangeValOf(dashboard,range,def.key,def.group):d[def.key];
  const t=range?rangeTrendOf(dashboard,range,def.key):trendOf(dashboard,midx,def.key);
  const up=t&&t.pct>=0;
  return(
    <div className="sp-card" style={{padding:"16px 18px 12px",position:"relative",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:8,marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.9px",textTransform:"uppercase",color:"var(--sp-sub)"}}>{def.label}</div>
        {range&&<span style={{fontSize:9.5,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",color:"var(--sp-blueText)",background:"var(--sp-blueSoft)",padding:"2px 7px",borderRadius:8,whiteSpace:"nowrap"}}>{def.group==="health"?"Period avg":"Latest"}</span>}
      </div>
      {editing&&!range?(
        <input value={d[def.key]||""} onChange={e=>onChange(def.key,e.target.value)} placeholder="0"
          style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--sp-line)",background:"var(--sp-surface2)",color:"var(--sp-text)",fontSize:20,fontWeight:800,fontVariantNumeric:"tabular-nums",outline:"none"}}/>
      ):(
        <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:30,fontWeight:800,letterSpacing:"-0.5px",fontVariantNumeric:"tabular-nums",color:"var(--sp-brand)",lineHeight:1}}>{fmtNum(val)}</span>
          {def.suffix&&numOf(val)!==null&&<span style={{fontSize:13,fontWeight:700,color:"var(--sp-sub)"}}>{def.suffix}</span>}
        </div>
      )}
      <div style={{marginTop:8,minHeight:20}}>
        {t?(
          <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,fontWeight:700,padding:"2px 9px",borderRadius:20,
            color:up?"var(--sp-up)":"var(--sp-down)",background:up?"var(--sp-upBg)":"var(--sp-downBg)"}}>
            {up?"▲":"▼"} {Math.abs(t.pct).toFixed(1)}%
            <span style={{fontWeight:500,opacity:0.75}}>{t.label||("vs "+t.prevMonth.split(" ")[0])}</span>
          </span>
        ):(
          <span style={{fontSize:12,color:"var(--sp-sub)",opacity:0.7}}>{range?"not enough data in period":"no prior data"}</span>
        )}
      </div>
      <Spark dashboard={dashboard} midx={midx} keyName={def.key} range={range}/>
    </div>
  );
}

  const GCard=({item})=>{const P=PM[item.pk]||{color:"#A5A5A5",light:"#A5A5A51C",label:item.pk||"—"};const sc=isPart(item.answers);const score=sc?finalScore(item.answers):null;const p=score!==null?priOf(score):null;const st=item.subtasks||[];const stDone=st.filter(s=>s.done).length;return(

      {multi&&<span style={{fontSize:10.5,fontWeight:600,color:P.color,background:P.light,padding:"1px 6px",borderRadius:4,border:`1px solid ${P.color}33`}}>{P.label}</span>}
      <div style={{fontSize:12,fontWeight:600,color:"var(--sp-text)",lineHeight:1.3,margin:"6px 0"}}>{item.name||"Untitled"}</div>
      {score!==null&&<SBar score={score} color={p.fg}/>}
      <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
        <PriPill score={score} priority={item.priority} onChange={v=>upd(item.pk,item.id,{priority:v})} sz={10}/>
        {(()=>{const s=stC(item.status);return<Chip label={item.status} fg={s.fg} bg={s.bg} bd={s.bg} sz={9}/>;})()}
        {st.length>0&&<span style={{fontSize:10.5,fontWeight:700,fontVariantNumeric:"tabular-nums",color:stDone===st.length?"#3CA06E":"var(--sp-sub)"}}>☑ {stDone}/{st.length}</span>}
      </div>
      <div style={{fontSize:12,color:"var(--sp-sub)",marginTop:5,fontVariantNumeric:"tabular-nums"}}>{item.owner||""}{item.deliveryManager?` · DM: ${item.deliveryManager}`:""}</div>
      {(item.start||item.end)&&<div style={{fontSize:11,color:"var(--sp-faint)",marginTop:2,fontVariantNumeric:"tabular-nums"}}>{item.start||"—"} → {item.end||"—"}</div>}
      {item.dmEst&&<div style={{fontSize:11,color:"var(--sp-brand)",marginTop:2}} title="Delivery Manager Estimation Time">DM est: {item.dmEst}</div>}
      <button onClick={()=>setModal(item)} style={{marginTop:8,padding:"4px 10px",borderRadius:8,fontSize:12,fontWeight:600,border:`1.5px solid ${P.color}44`,color:P.color,background:P.light,width:"100%"}}>{isFull(item.answers)?"Re-score":isPart(item.answers)?"Continue":"Score"}</button>
    </div>);};

  const BCol=({status})=>{const ci=fil.filter(i=>i.status===status);const s=stC(status);return(
    <div style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderRadius:10,overflow:"hidden",minWidth:146}}>
      <div style={{padding:"7px 11px",background:s.bg+"44",borderBottom:"1.5px solid var(--sp-line)",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:700,color:s.fg}}>{status}</span><span style={{fontSize:12,color:"var(--sp-sub)",fontVariantNumeric:"tabular-nums"}}>{ci.length}</span></div>
      <div style={{padding:7,minHeight:70}}>{ci.map(item=>{const P=PM[item.pk]||{color:"#A5A5A5",light:"#A5A5A51C",label:item.pk||"—"};const sc=isPart(item.answers);const score=sc?finalScore(item.answers):null;const p=score?priOf(score):null;return(
        <div key={item.id} onClick={()=>setModal(item)} style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderRadius:8,padding:"7px 9px",marginBottom:5,borderLeft:`3px solid ${P.color}`,cursor:"pointer"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--sp-text)",lineHeight:1.3,marginBottom:3}}>{item.name}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>{multi&&<span style={{fontSize:9.5,fontWeight:600,color:P.color}}>{P.label}</span>}{(()=>{const rp=resolvePri(score,item.priority);const c=rp?priColor(rp):null;return rp?<Chip label={rp} fg={c.fg} bg={c.bg} bd={c.bd} sz={9}/>:null;})()}{score&&<span style={{fontSize:11,fontVariantNumeric:"tabular-nums",color:p?p.fg:"var(--sp-sub)"}}>{score.toFixed(1)}</span>}</div>
        </div>);})}
      {ci.length===0&&<div style={{fontSize:12,color:"var(--sp-lineStrong)",textAlign:"center",paddingTop:12}}>Empty</div>}</div>
    </div>);};

  const filterItems=[
    ...(multi?[{key:"fP",label:"Product",val:fP,opts:prodKeys.map(k=>({v:k,l:PM[k].label}))}]:[]),
    {key:"fSt",label:"Status",val:fSt,opts:ST.map(s=>({v:s,l:s}))},
    {key:"fO",label:"Owner",val:fO,opts:owners.map(o=>({v:o,l:o}))},
  ];
  return(
    <div style={{padding:"18px 22px 50px"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14,gap:14,flexWrap:"wrap"}}>
        <div>
          <div className="sp-display" style={{fontSize:22,fontWeight:800,letterSpacing:"-0.2px",color:AC,marginBottom:3}}>{title}</div>
          <div style={{fontSize:12,color:"var(--sp-sub)",lineHeight:1.5,maxWidth:560}}>{subtitle}</div>
          <div style={{display:"flex",gap:7,marginTop:8,flexWrap:"wrap"}}>
            {multi&&prodKeys.map(k=>{const P=PM[k];return<span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,color:P.color,background:P.light,padding:"3px 9px",borderRadius:12,border:`1px solid ${P.color}33`}}><span style={{width:7,height:7,borderRadius:"50%",background:P.color}}/>{P.label} · {(roadmap[k]||[]).length}</span>;})}
            <span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:AC,background:AC+"14",padding:"3px 9px",borderRadius:12,border:`1px solid ${AC}33`}}>{full}/{items.length} fully scored</span>
            {part>full&&<span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:"#FA783C",background:"#FA783C1C",padding:"3px 9px",borderRadius:12,border:"1px solid #FA783C55"}}>{part-full} in progress</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{CRIT.map(c=><div key={c.key} style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderRadius:8,padding:"7px 9px",minWidth:100}}><div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}><span style={{width:7,height:7,borderRadius:1,background:c.color}}/><span style={{fontSize:12,fontWeight:600,color:"var(--sp-text)"}}>{c.label}</span></div><div style={{fontSize:11,color:"var(--sp-sub)",fontVariantNumeric:"tabular-nums"}}>{c.weight}% - {c.qs.length}q</div></div>)}</div>
      </div>
      <Filters items={filterItems} onChange={(k,v)=>{if(k==="fP")setFP(v);if(k==="fSt")setFSt(v);if(k==="fO")setFO(v);}} views={[{k:"table",i:"T",l:"Table"},{k:"grid",i:"G",l:"Grid"},{k:"board",i:"B",l:"Board"}]} activeView={vm} onView={setVm} count={`${fil.length} features`}
        extra2={multi?(<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,color:"var(--sp-sub)",fontWeight:600}}>Add to</span><select style={SEL} value={addTo} onChange={e=>setAddTo(e.target.value)}>{prodKeys.map(k=><option key={k} value={k}>{PM[k].label}</option>)}</select></div>):null}
        onAdd={()=>setShowAdd(true)} addLabel="+ Add Feature" addColor={AC}/>
      {vm==="table"&&(<div style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderTop:"none",borderRadius:"0 0 12px 12px",overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={{...TH,minWidth:180}}>Feature</th>{multi&&<th style={TH}>Product</th>}<th style={{...TH,minWidth:140}}>Score</th><th style={TH}>Priority</th><th style={TH}>Action</th><th style={TH}>Status</th><th style={TH}>Start</th><th style={TH}>End</th>{multi?(<Frag><th style={TH}>Product Owner</th><th style={TH}>Delivery Manager</th></Frag>):<th style={TH}>Owner</th>}<th style={TH}>Jira</th><th style={TH}>Sub-tasks</th><th style={TH} title="Delivery Manager Estimation Time">DM Est. Time</th><th style={TH}>Notes</th><th style={TH}>Updated</th><th style={TH}/></tr></thead><tbody>{fil.length?fil.map(item=><Row key={item.id} item={item}/>):<tr><td colSpan={COLS} style={{padding:24,textAlign:"center",color:"var(--sp-sub)",fontSize:12}}>No features match filters.</td></tr>}</tbody></table></div>)}
      {vm==="grid"&&(<div style={{border:"1.5px solid var(--sp-line)",borderTop:"none",borderRadius:"0 0 12px 12px",background:"var(--sp-surface2)",padding:10,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>{fil.length?fil.map(item=><GCard key={item.id} item={item}/>):<div style={{gridColumn:"1/-1",padding:24,textAlign:"center",color:"var(--sp-faint)",fontSize:12}}>No features.</div>}</div>)}
      {vm==="board"&&(<div style={{border:"1.5px solid var(--sp-line)",borderTop:"none",borderRadius:"0 0 12px 12px",background:"var(--sp-surface2)",padding:10,display:"grid",gridTemplateColumns:`repeat(${ST.length},minmax(146px,1fr))`,gap:10,overflowX:"auto"}}>{ST.map(s=><BCol key={s} status={s}/>)}</div>)}
      {showAdd&&<AddFeatureModal prodKeys={prodKeys} defaultProduct={multi?addTo:prodKeys[0]} accent={AC} onClose={()=>setShowAdd(false)} onCreate={(pk,feat,openAfter)=>{addRM(pk,feat);setShowAdd(false);if(openAfter&&openFeature)openFeature(pk,feat.id);}}/>}
    </div>
  );
}

/* ─── ACTIVITIES TAB ─────────────────────────────────────────────────────── */
function ActivitiesTab({activities,setActivities,roadmap}){
  const[fP,setFP]=useState("");const[fT,setFT]=useState("");const[fSt,setFSt]=useState("");const[fPr,setFPr]=useState("");const[fO,setFO]=useState("");
  const[vm,setVm]=useState("table");const[no,setNo]=useState({});
  const[showForm,setShowForm]=useState(false);
  const blankA={product:"va",type:"research",title:"",desc:"",status:"Not Started",quarter:"Q2 2026",sprint:"",priority:"Medium",owner:"",notes:"",deliverables:"",jira:"",linkedFeatures:[],start:"",end:""};
  const[newA,setNewA]=useState(blankA);
  const owners=useMemo(()=>[...new Set(activities.map(a=>a.owner).filter(Boolean))],[activities]);
  const fil=useMemo(()=>activities.filter(a=>{if(fP&&a.product!==fP)return false;if(fT&&a.type!==fT)return false;if(fSt&&a.status!==fSt)return false;if(fPr&&a.priority!==fPr)return false;if(fO&&a.owner!==fO)return false;return true;}),[activities,fP,fT,fSt,fPr,fO]);
  const upd=(id,ch)=>setActivities(p=>p.map(a=>a.id===id?{...a,...ch,updated:now()}:a));
  const del=id=>setActivities(p=>p.filter(a=>a.id!==id));
  const save=()=>{if(!newA.title.trim())return;setActivities(p=>[...p,{...newA,id:uid(),updated:now()}]);setNewA(blankA);setShowForm(false);};
  const byType=useMemo(()=>{const m={};fil.forEach(a=>{m[a.type]=(m[a.type]||0)+1;});return m;},[fil]);
  const featOf=(pk,id)=>((roadmap[pk]||[]).find(x=>x.id===id));

  const LinkedFeatures=({act,compact})=>{const P=PM[act.product];const lf=act.linkedFeatures||[];return(
    <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:compact?0:170}}>
      {lf.map(fid=>{const f=featOf(act.product,fid);if(!f)return null;return(
        <span key={fid} title={f.name} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,fontWeight:600,color:P?.color,background:P?.light,border:`1px solid ${P?.color}33`,borderRadius:6,padding:"3px 8px",maxWidth:200}}>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
          {!compact&&<span onClick={()=>upd(act.id,{linkedFeatures:lf.filter(x=>x!==fid)})} style={{cursor:"pointer",fontWeight:800,flexShrink:0}}>×</span>}
        </span>);})}
      {!compact&&<select style={{...SEL,fontSize:11,padding:"4px 8px",maxWidth:200}} value="" onChange={e=>{if(e.target.value)upd(act.id,{linkedFeatures:[...new Set([...lf,e.target.value])]});}}>
        <option value="">+ Link feature…</option>
        {(roadmap[act.product]||[]).filter(f=>!lf.includes(f.id)).map(f=><option key={f.id} value={f.id}>{f.name}</option>)}
      </select>}
      {compact&&lf.length===0&&<span style={{fontSize:11,color:"var(--sp-faint)"}}>—</span>}
    </div>);};

  const ARow=({act})=>{const T=TM[act.type];const P=PM[act.product];const hasNote=!!(act.notes&&act.notes.trim());const hasDlv=!!(act.deliverables&&act.deliverables.trim());const noteOpen=no[act.id];const dlvOpen=no[`d-${act.id}`];return(<Frag>
    <tr style={{background:act.status==="Done"?"#3CA06E14":act.status==="Blocked"?"#FF466414":"transparent"}}>
      <td style={TD}><span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:P?.color||"var(--sp-text)",background:P?.light||"var(--sp-surface2)",padding:"2px 7px",borderRadius:4,border:`1px solid ${(P?.color||"var(--sp-text)")}33`,whiteSpace:"nowrap"}}>{P?.label||act.product}</span></td>
      <td style={TD}><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:18,height:18,borderRadius:4,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>{T?.icon||"?"}</span><span style={{fontSize:12,color:T?.color||"#646EC8",fontWeight:600}}>{T?.label||act.type}</span></div></td>
      <td style={{...TD,minWidth:180}}><div contentEditable suppressContentEditableWarning onBlur={e=>upd(act.id,{title:e.target.textContent})} style={{fontWeight:600,color:"var(--sp-text)",fontSize:12,outline:"none"}}>{act.title}</div>{act.desc&&<div style={{fontSize:12,color:"var(--sp-sub)",marginTop:2,lineHeight:1.4}}>{act.desc}</div>}</td>
      <td style={TD}><LinkedFeatures act={act}/></td>
      <td style={TD}><select style={{...SEL,fontSize:12}} value={act.priority} onChange={e=>upd(act.id,{priority:e.target.value})}>{PR.map(p=><option key={p}>{p}</option>)}</select></td>
      <td style={TD}><select style={{...SEL,fontSize:12}} value={act.status} onChange={e=>upd(act.id,{status:e.target.value})}>{AST.map(s=><option key={s}>{s}</option>)}</select></td>
      <td style={TD}><input type="date" style={{...INP(128),padding:"6px 8px",fontSize:12}} value={act.start||""} onChange={e=>upd(act.id,{start:e.target.value})}/></td>
      <td style={TD}><input type="date" style={{...INP(128),padding:"6px 8px",fontSize:12}} value={act.end||""} onChange={e=>upd(act.id,{end:e.target.value})}/></td>
      <td style={TD}><input style={INP(78)} defaultValue={act.owner||""} placeholder="Owner" onBlur={e=>upd(act.id,{owner:e.target.value})}/></td>
      <td style={TD}><NoteBtn has={hasDlv} color="#646EC8" label="Deliverables" onClick={()=>setNo(n=>({...n,[`d-${act.id}`]:!n[`d-${act.id}`]}))}/></td>
      <td style={TD}><NoteBtn has={hasNote} color="#FA783C" label="Notes" onClick={()=>setNo(n=>({...n,[act.id]:!n[act.id]}))}/></td>
      <td style={TD}><button onClick={()=>del(act.id)} style={{color:"var(--sp-faint)",fontSize:14,padding:"0 4px"}}>×</button></td>
    </tr>
    {noteOpen&&<tr style={{background:"var(--sp-surface2)"}}><td colSpan={12} style={{padding:"9px 14px",borderBottom:"1.5px solid var(--sp-line)"}}><NotePanel label={`Notes — ${act.title}`} color="#FA783C" icon="✎" value={act.notes} onChange={v=>upd(act.id,{notes:v})} placeholder="Notes, context, links…"/></td></tr>}
    {dlvOpen&&<tr style={{background:"var(--sp-surface2)"}}><td colSpan={12} style={{padding:"9px 14px",borderBottom:"1.5px solid var(--sp-line)"}}><NotePanel label={`Deliverables — ${act.title}`} color="#646EC8" icon="◆" value={act.deliverables} onChange={v=>upd(act.id,{deliverables:v})} placeholder="Describe deliverables…"/></td></tr>}
  </Frag>);};

  const AGCard=({act})=>{const T=TM[act.type];const P=PM[act.product];const pS={Highest:{fg:"#FF4664",bg:"#FF46641C"},Critical:{fg:"#FF4664",bg:"#FF46641C"},High:{fg:"#FA783C",bg:"#FA783C1C"},Medium:{fg:"#646EC8",bg:"#646EC81C"},Low:{fg:"#3CA06E",bg:"#3CA06E1C"}}[act.priority]||{fg:"var(--sp-text)",bg:"var(--sp-surface2)"};return(
    <div style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderRadius:10,padding:"11px 13px",borderLeft:`3px solid ${T?.color||"#646EC8"}`}}>
      <div style={{display:"flex",gap:5,marginBottom:6,alignItems:"center"}}><span style={{width:18,height:18,borderRadius:4,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>{T?.icon||"?"}</span><span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:P?.color||"var(--sp-text)",background:P?.light||"var(--sp-surface2)",padding:"1px 5px",borderRadius:3,border:`1px solid ${(P?.color||"var(--sp-text)")}33`}}>{P?.label}</span></div>
      <div style={{fontSize:12,fontWeight:600,color:"var(--sp-text)",lineHeight:1.3,marginBottom:4}}>{act.title}</div>
      {act.desc&&<div style={{fontSize:12,color:"var(--sp-sub)",lineHeight:1.4,marginBottom:5}}>{act.desc}</div>}
      {(act.linkedFeatures||[]).length>0&&<div style={{marginBottom:5}}><LinkedFeatures act={act} compact/></div>}
      {act.deliverables&&act.deliverables.trim()&&<div style={{fontSize:12,color:"#646EC8",background:"#646EC81C",padding:"4px 7px",borderRadius:5,marginBottom:5,lineHeight:1.4}}>Deliverables: {act.deliverables.split("\n")[0]}...</div>}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}><Chip label={act.priority} fg={pS.fg} bg={pS.bg} bd={pS.bg} sz={9}/>{(()=>{const st=stC(act.status);return<Chip label={act.status} fg={st.fg} bg={st.bg} bd={st.bg} sz={9}/>;})()}</div>
      <div style={{fontSize:12,color:"var(--sp-sub)",marginTop:5,fontVariantNumeric:"tabular-nums"}}>{(act.start||act.end)?`${act.start||"—"} → ${act.end||"—"}`:""}{act.owner?`${(act.start||act.end)?" · ":""}${act.owner}`:""}</div>
    </div>);};

  return(
    <div style={{padding:"18px 22px 50px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginBottom:12}}>{ATYPES.map(t=>(<div key={t.key} onClick={()=>setFT(f=>f===t.key?"":t.key)} style={{background:fT===t.key?t.light:"var(--sp-surface)",border:`1.5px solid ${fT===t.key?t.color:"var(--sp-surface3)"}`,borderRadius:10,padding:"9px 11px",cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{width:19,height:19,borderRadius:4,background:t.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0}}>{t.icon}</span><span style={{fontSize:11,fontWeight:600,color:"var(--sp-text)"}}>{t.label}</span></div><div style={{fontSize:18,fontWeight:700,color:t.color,fontVariantNumeric:"tabular-nums"}}>{byType[t.key]||0}</div></div>))}</div>
      <Filters items={[{key:"fP",label:"Product",val:fP,opts:PRODS.map(p=>({v:p.key,l:p.label}))},{key:"fT",label:"Type",val:fT,opts:ATYPES.map(t=>({v:t.key,l:t.label}))},{key:"fSt",label:"Status",val:fSt,opts:AST.map(s=>({v:s,l:s}))},{key:"fPr",label:"Priority",val:fPr,opts:PR.map(p=>({v:p,l:p}))},{key:"fO",label:"Owner",val:fO,opts:owners.map(o=>({v:o,l:o}))}]} onChange={(k,v)=>{if(k==="fP")setFP(v);if(k==="fT")setFT(v);if(k==="fSt")setFSt(v);if(k==="fPr")setFPr(v);if(k==="fO")setFO(v);}} views={[{k:"table",i:"T",l:"Table"},{k:"grid",i:"G",l:"Grid"},{k:"board",i:"B",l:"Board"}]} activeView={vm} onView={setVm} count={`${fil.length} activities`} onAdd={()=>setShowForm(f=>!f)} addLabel={showForm?"Cancel":"+ Add Activity"} addColor={showForm?"#FF4664":"#64A0DC"}/>
      {showForm&&(<div style={{background:"var(--sp-surface2)",border:"1.5px solid var(--sp-line)",borderTop:"none",padding:"12px 14px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:12,color:"var(--sp-sub)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Title *</div><input value={newA.title} onChange={e=>setNewA(a=>({...a,title:e.target.value}))} placeholder="Activity title..." style={{...INP("100%"),padding:"6px 10px",fontSize:13}}/></div>
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:12,color:"var(--sp-sub)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Description</div><input value={newA.desc} onChange={e=>setNewA(a=>({...a,desc:e.target.value}))} placeholder="Short description..." style={{...INP("100%"),padding:"5px 8px"}}/></div>
        {[{l:"Product",f:"product",opts:PRODS.map(p=>({v:p.key,l:p.label}))},{l:"Type",f:"type",opts:ATYPES.map(t=>({v:t.key,l:t.label}))},{l:"Status",f:"status",opts:AST.map(s=>({v:s,l:s}))},{l:"Priority",f:"priority",opts:PR.map(p=>({v:p,l:p}))}].map(f=>(<div key={f.f}><div style={{fontSize:12,color:"var(--sp-sub)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>{f.l}</div><select style={{...SEL,width:"100%",padding:"5px 8px"}} value={newA[f.f]} onChange={e=>setNewA(a=>({...a,[f.f]:e.target.value,...(f.f==="product"?{linkedFeatures:[]}:{})}))}>{f.opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>))}

  const scored=useMemo(()=>all.filter(i=>isPart(i.answers)).map(i=>({...i,score:finalScore(i.answers)})).sort((a,b)=>b.score-a.score),[all]);

        <div style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderRadius:12,overflow:"hidden"}}><div style={{padding:"12px 16px",background:"var(--sp-surface2)",borderBottom:"1.5px solid var(--sp-line)",fontSize:12,fontWeight:600,color:"var(--sp-text)",textTransform:"uppercase",letterSpacing:"0.6px"}}>Scoring framework</div><div style={{padding:"11px 13px"}}><div style={{fontSize:11,color:"var(--sp-text)",lineHeight:1.5,marginBottom:11}}>4 criteria - 13 questions - max 5.0 - priority defaults from score, editable manually.</div>{CRIT.map(c=><div key={c.key} style={{marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:1,background:c.color}}/><span style={{fontSize:11,fontWeight:600,color:"var(--sp-text)"}}>{c.label}</span></div><span style={{fontSize:12,fontVariantNumeric:"tabular-nums",color:"var(--sp-sub)"}}>{c.weight}% - {c.qs.length}q</span></div>)}<div style={{borderTop:"1px solid var(--sp-surface3)",paddingTop:9,marginTop:9,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>{[{l:"Highest",s:">=4.0",fg:"#FF4664",bg:"#FF46641C"},{l:"High",s:">=3.0",fg:"#FA783C",bg:"#FA783C1C"},{l:"Medium",s:">=2.0",fg:"#646EC8",bg:"#646EC81C"},{l:"Low",s:"<2.0",fg:"#3CA06E",bg:"#3CA06E1C"}].map(t=>(<div key={t.l} style={{textAlign:"center",background:t.bg,borderRadius:8,padding:"5px 3px"}}><div style={{fontSize:12,fontWeight:700,color:t.fg,fontVariantNumeric:"tabular-nums"}}>{t.l}</div><div style={{fontSize:11,color:t.fg,fontVariantNumeric:"tabular-nums"}}>{t.s}</div></div>))}</div></div></div>

nums",fontSize:11,color:"var(--sp-sub)"}}>{item.quarter}</td><td style={{...TD,fontVariantNumeric:"tabular-nums",fontSize:11,color:"var(--sp-sub)"}}>{item.owner||"-"}</td><td style={{...TD,fontVariantNumeric:"tabular-nums",fontSize:11,color:"#646EC8"}}>{item.jira||"-"}</td></tr>);})}</tbody></table></div>)}</div>

/* ─── JOURNEY STAGES (A → Z) ─────────────────────────────────────────────── */
const STAGES=[
  {k:"intake", n:"Intake",  d:"Ideas & requests captured",      c:"#A5A5A5"},
  {k:"scored", n:"Scored",  d:"Evaluated & prioritized",        c:"#646EC8"},
  {k:"planned",n:"Planned", d:"Dates, owner & sub-tasks set",   c:"#64A0DC"},
  {k:"build",  n:"In Build",d:"Execution in progress",          c:"#FA783C"},
  {k:"done",   n:"Done",    d:"Delivered & closed",             c:"#3CA06E"},
];
const stageOf=i=>{
  if(i.status==="Done")return"done";
  if(i.status==="In Progress")return"build";
  const planned=(i.start&&i.end)||(i.subtasks||[]).length>0||i.status==="Design";
  if(isPart(i.answers)&&planned)return"planned";
  if(isPart(i.answers))return"scored";
  return"intake";
};
const subProg=i=>{const st=i.subtasks||[];return st.length?Math.round(st.filter(s=>s.done).length/st.length*100):null;};

/* ─── FEATURE JOURNEY DRAWER (per-item flow: Define → Score → Plan → Track) ─ */
const JSTEPS=[
  {k:1,n:"Define",d:"What & why"},
  {k:2,n:"Score", d:"Evaluate & prioritize"},
  {k:3,n:"Plan",  d:"Dates & sub-tasks"},
  {k:4,n:"Track", d:"Execute to done"},
];
function FeatureDrawer({item,activities,updRM,moveRM,onDelete,onClose}){
  const upd=ch=>updRM(item.pk,item.id,{...ch,updated:now()});
  const updP=(pk,id,ch)=>updRM(pk,id,{...ch,updated:now()});
  const P=PM[item.pk]||{color:"#78006E",light:"#78006E1C",label:item.pk};
  const score=isPart(item.answers)?finalScore(item.answers):null;
  const pri=score!==null?priOf(score):null;
  const done1=!!(item.name&&item.desc&&item.owner);
  const done2=isFull(item.answers);
  const done3=!!(item.start&&item.end&&(item.subtasks||[]).length>0);
  const done4=item.status==="Done";
  const dones=[done1,done2,done3,done4];
  const first=dones.findIndex(d=>!d);
  const[step,setStep]=useState(first===-1?4:first+1);
  const setAns=(k,v)=>upd({answers:{...(item.answers||{}),[k]:Number(v)}});
  const IN={background:"var(--sp-surface2)",border:"1.5px solid var(--sp-line)",borderRadius:9,padding:"8px 11px",fontSize:13,color:"var(--sp-text)",width:"100%"};
  const LBL={fontSize:11,fontWeight:800,letterSpacing:"0.9px",textTransform:"uppercase",color:"var(--sp-sub)",margin:"15px 0 5px"};
  const pr=subProg(item);
  const linked=(activities||[]).filter(a=>(a.linkedFeatures||[]).includes(item.id));
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(42,7,38,0.5)",backdropFilter:"blur(2px)",zIndex:150,display:"flex",justifyContent:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} className="drawer-panel" style={{width:"min(660px,100%)",height:"100%",background:"var(--sp-surface)",display:"flex",flexDirection:"column",boxShadow:"-12px 0 40px rgba(0,0,0,0.25)"}}>
        {/* header */}
        <div style={{background:"#78006E",padding:"18px 24px 0",color:"#fff",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:700,background:"rgba(255,255,255,0.16)",border:"1px solid rgba(255,255,255,0.3)",padding:"3px 10px",borderRadius:12,whiteSpace:"nowrap"}}>{P.label}</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {(()=>{const rp=resolvePri(score,item.priority);const rc=rp?priColor(rp):null;return(<div style={{display:"flex",gap:6,alignItems:"center"}}>{score!==null&&<span style={{fontSize:11,fontWeight:800,background:"#fff",color:pri?pri.fg:"#4B4B4B",padding:"4px 11px",borderRadius:12,whiteSpace:"nowrap"}}>{score.toFixed(1)}</span>}<div style={{background:"#fff",borderRadius:12,padding:"1px 3px"}}><PriPill score={score} priority={item.priority} onChange={v=>upd({priority:v})} sz={11}/></div></div>);})()}
              <button onClick={onClose} style={{width:30,height:30,borderRadius:9,color:"#fff",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.35)",fontSize:15,fontWeight:800,flexShrink:0}}>×</button>
            </div>
          </div>
          <div className="sp-display" style={{fontSize:20,fontWeight:800,marginTop:9,lineHeight:1.25,paddingBottom:2}}>{item.name||"Untitled feature"}</div>
          <div style={{display:"flex",marginTop:12}}>
            {JSTEPS.map((s,i)=>{const active=step===s.k;const dn=dones[i];return(
              <div key={s.k} onClick={()=>setStep(s.k)} style={{flex:1,cursor:"pointer",textAlign:"center",padding:"7px 4px 10px",borderBottom:`3px solid ${active?"#fff":"rgba(255,255,255,0.22)"}`,opacity:active?1:0.78,userSelect:"none"}}>
                <div style={{width:22,height:22,margin:"0 auto 4px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,
                  background:dn?"#3CA06E":"rgba(255,255,255,0.18)",border:dn?"none":"1.5px solid rgba(255,255,255,0.45)",color:"#fff"}}>{dn?"✓":s.k}</div>
                <div style={{fontSize:11.5,fontWeight:700}}>{s.n}</div>
                <div style={{fontSize:9.5,opacity:0.85}}>{s.d}</div>
              </div>);})}
          </div>
        </div>
        <div style={{height:8,backgroundImage:`url(data:image/png;base64,${ASSET_STRIP})`,backgroundSize:"auto 100%",backgroundRepeat:"repeat-x",flexShrink:0}}/>
        {/* body */}
        <div className="fade-in" key={step+item.id} style={{flex:1,overflowY:"auto",padding:"14px 24px 26px"}}>
          {step===1&&(<div>
            <div style={LBL}>Product</div>
            <select style={IN} value={item.pk} onChange={e=>moveRM(item.pk,item.id,e.target.value)}>{PRODS.map(pp=><option key={pp.key} value={pp.key}>{pp.label}</option>)}</select>

            <textarea style={{...IN,minHeight:110}} defaultValue={item.desc||""} placeholder="Problem, opportunity, and expected outcome…" onBlur={e=>upd({desc:e.target.value})}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {item.pk==="txs"?(<div><div style={LBL}>Owner</div><input style={IN} defaultValue={item.owner||""} placeholder="Who drives this?" onBlur={e=>upd({owner:e.target.value})}/></div>):(<div><div style={LBL}>Product Owner</div><select style={IN} value={item.owner||""} onChange={e=>upd({owner:e.target.value})}><option value="">— Select —</option>{PRODUCT_OWNERS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>)}
              {item.pk!=="txs"&&<div><div style={LBL}>Delivery Manager</div><input style={IN} defaultValue={item.deliveryManager||""} placeholder="e.g. Rana Al-Otaibi" onBlur={e=>upd({deliveryManager:e.target.value})}/></div>}
              <div><div style={LBL}>Jira ticket</div><input style={IN} defaultValue={item.jira||""} placeholder="PROJ-123" onBlur={e=>upd({jira:e.target.value})}/></div>
            </div>
            <div style={{marginTop:18,padding:"11px 14px",borderRadius:10,background:P.light,border:`1px solid ${P.color}33`,fontSize:12,color:P.color,lineHeight:1.5}}>
              <strong>Next →</strong> score this feature against the 4 criteria to place it in the priority order.
            </div>
          </div>)}
          {step===2&&(<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,margin:"12px 0 6px"}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--sp-text)"}}>Weighted score</div>
              <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:"tabular-nums",color:pri?pri.fg:"var(--sp-faint)"}}>{score!==null?score.toFixed(1):"—"}<span style={{fontSize:12,color:"var(--sp-faint)",fontWeight:600}}> / 5</span></div>
            </div>
            {score!==null&&<SBar score={score} color={pri.fg}/>}
            {CRIT.map(c=>{const cs=critScore(c.key,item.answers);return(

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>

                      <option value="">— Select —</option>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

              <div><div style={LBL}>DM estimation time</div><input style={IN} defaultValue={item.dmEst||""} placeholder="e.g. 3 weeks" title="Delivery Manager Estimation Time" onBlur={e=>upd({dmEst:e.target.value})}/></div>

          </div>)}
          {step===4&&(<div>
            <div style={LBL}>Status</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {ST.map(s=>{const c=stC(s);const on=item.status===s;return(
                <button key={s} onClick={()=>upd({status:s})} style={{padding:"7px 15px",borderRadius:18,fontSize:12.5,fontWeight:700,border:`1.5px solid ${on?c.fg:"var(--sp-lineStrong)"}`,background:on?c.bg:"transparent",color:on?c.fg:"var(--sp-sub)"}}>{s}</button>);})}
            </div>
            <div style={LBL}>Priority</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
              {PR.map(pv=>{const c=priColor(pv);const cur=resolvePri(score,item.priority);const on=cur===pv;const isAuto=!item.priority&&cur===pv;return(
                <button key={pv} onClick={()=>upd({priority:pv})} style={{padding:"7px 15px",borderRadius:18,fontSize:12.5,fontWeight:700,border:`1.5px solid ${on?c.fg:"var(--sp-lineStrong)"}`,background:on?c.bg:"transparent",color:on?c.fg:"var(--sp-sub)",boxShadow:isAuto?`inset 0 0 0 1.5px ${c.fg}55`:"none"}}>{pv}{isAuto&&" · auto"}</button>);})}
              {item.priority&&<button onClick={()=>upd({priority:""})} title="Reset to auto (derived from score)" style={{padding:"7px 12px",borderRadius:18,fontSize:11.5,fontWeight:700,border:"1.5px dashed var(--sp-lineStrong)",background:"transparent",color:"var(--sp-sub)"}}>Reset to auto</button>}
            </div>
            <div style={LBL}>Sub-task progress</div>
            {pr===null?<div style={{fontSize:12.5,color:"var(--sp-faint)"}}>No sub-tasks yet — add them in the Plan step.</div>:(
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,height:9,background:"var(--sp-surface3)",borderRadius:5,overflow:"hidden"}}><div style={{height:"100%",width:`${pr}%`,background:pr===100?"#3CA06E":"#64A0DC",borderRadius:5,transition:"width .3s"}}/></div>
                <span style={{fontSize:13,fontWeight:800,fontVariantNumeric:"tabular-nums",color:pr===100?"#3CA06E":"var(--sp-text)"}}>{pr}%</span>
              </div>)}
            <div style={LBL}>Linked activities ({linked.length})</div>
            {linked.length===0&&<div style={{fontSize:12.5,color:"var(--sp-faint)"}}>None — link activities to this feature from the Activities tab.</div>}
            {linked.map(a=>{const T=TM[a.type];const as=stC(a.status);return(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,background:"var(--sp-surface2)",border:"1px solid var(--sp-line)",borderRadius:9,padding:"8px 12px",marginBottom:6}}>
                <span style={{width:18,height:18,borderRadius:4,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700,flexShrink:0}}>{T?.icon||"?"}</span>
                <span style={{flex:1,fontSize:12.5,color:"var(--sp-text)"}}>{a.title}</span>
                <Chip label={a.status} fg={as.fg} bg={as.bg} bd={as.bd} sz={10}/>
              </div>);})}
            <div style={LBL}>Notes</div>
            <textarea style={{...IN,minHeight:90}} defaultValue={item.notes||""} placeholder="Blockers, decisions, context…" onBlur={e=>upd({notes:e.target.value})}/>
            <div style={{fontSize:11.5,color:"var(--sp-faint)",marginTop:12,fontVariantNumeric:"tabular-nums"}}>Last updated: {item.updated||"—"}</div>
          </div>)}
        </div>
        {/* footer */}
        <div style={{flexShrink:0,padding:"12px 24px",borderTop:"1.5px solid var(--sp-line)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,background:"var(--sp-surface2)"}}>
          <button onClick={()=>{if(window.confirm(`Delete "${item.name}"? This cannot be undone.`))onDelete();}} style={{padding:"7px 15px",borderRadius:9,fontSize:12,fontWeight:700,color:"#FF4664",background:"#FF46641C",border:"1.5px solid #FF466455"}}>Delete feature</button>
          <div style={{display:"flex",gap:8}}>
            {step>1&&<button onClick={()=>setStep(s=>s-1)} style={{padding:"7px 17px",borderRadius:9,fontSize:12.5,fontWeight:700,color:"var(--sp-text)",background:"var(--sp-surface)",border:"1.5px solid var(--sp-lineStrong)"}}>← Back</button>}
            {step<4&&<button onClick={()=>setStep(s=>s+1)} style={{padding:"7px 17px",borderRadius:9,fontSize:12.5,fontWeight:700,color:"#fff",background:"var(--sp-brand)",border:"none"}}>Next step →</button>}
            {step===4&&item.status!=="Done"&&<button onClick={()=>upd({status:"Done"})} style={{padding:"7px 17px",borderRadius:9,fontSize:12.5,fontWeight:700,color:"#fff",background:"#3CA06E",border:"none"}}>✓ Mark done</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── PIPELINE — FULL JOURNEY A → Z ──────────────────────────────────────── */
function PipelineView({roadmap,openFeature,addRM,products}){
  const[showAdd,setShowAdd]=useState(false);
  const[fP,setFP]=useState("");
  const items=useMemo(()=>{let r=[];Object.keys(roadmap).forEach(pk=>(roadmap[pk]||[]).forEach(i=>r.push({...i,pk,stage:stageOf(i),score:isPart(i.answers)?finalScore(i.answers):null})));return r;},[roadmap]);
  const fil=fP?items.filter(i=>i.pk===fP):items;
  const byStage=k=>fil.filter(i=>i.stage===k).sort((a,b)=>(b.score||0)-(a.score||0));
  const HINT={intake:"New features start here. Open one and complete Define.",scored:"Scored & ranked. Add dates + sub-tasks to move to Planned.",planned:"Ready to build. Set status to In Progress to start.",build:"In execution — track sub-tasks & blockers.",done:"Shipped. 🎉"};
  const Card=({i})=>{const P=PM[i.pk]||{color:"#A5A5A5",light:"#A5A5A51C",label:i.pk||"—"};const rp=resolvePri(i.score,i.priority);const pri=rp?priColor(rp):null;const st=i.subtasks||[];const dn=st.filter(s=>s.done).length;const pr=st.length?Math.round(dn/st.length*100):null;return(
    <div onClick={()=>openFeature(i.pk,i.id)} className="sp-card" style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderLeft:`4px solid ${P?.color||"#78006E"}`,borderRadius:12,padding:"11px 13px",marginBottom:8,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,marginBottom:5}}>
        <span style={{fontSize:10.5,fontWeight:700,color:P?.color,background:P?.light,padding:"2px 7px",borderRadius:5,border:`1px solid ${P?.color}33`,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{P?.label}</span>
        {i.status==="Blocked"&&<span style={{fontSize:9.5,fontWeight:800,color:"#FF4664",background:"#FF46641C",padding:"2px 7px",borderRadius:5,whiteSpace:"nowrap"}}>⛔ BLOCKED</span>}
        {i.status==="On Hold"&&<span style={{fontSize:9.5,fontWeight:800,color:"#FA783C",background:"#FA783C1C",padding:"2px 7px",borderRadius:5,whiteSpace:"nowrap"}}>⏸ HOLD</span>}
      </div>
      <div style={{fontSize:12.5,fontWeight:600,color:"var(--sp-text)",lineHeight:1.35,marginBottom:6}}>{i.name}</div>
      {i.score!==null&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}><SBar score={i.score} color={pri?pri.fg:"#646EC8"}/><span style={{fontSize:11,fontWeight:800,fontVariantNumeric:"tabular-nums",color:pri?pri.fg:"#646EC8",flexShrink:0}}>{i.score.toFixed(1)}</span>{rp&&<span style={{fontSize:9.5,fontWeight:800,color:pri.fg,background:pri.bg,padding:"1px 6px",borderRadius:5,border:`1px solid ${pri.bd}`,letterSpacing:"0.3px"}}>{rp.toUpperCase()}</span>}</div>}
      {pr!==null&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}><div style={{flex:1,height:5,background:"var(--sp-surface3)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pr}%`,background:pr===100?"#3CA06E":"#64A0DC"}}/></div><span style={{fontSize:10,fontWeight:700,fontVariantNumeric:"tabular-nums",color:"var(--sp-sub)",flexShrink:0}}>☑ {dn}/{st.length}</span></div>}
      <div style={{fontSize:10.5,color:"var(--sp-faint)",fontVariantNumeric:"tabular-nums"}}>{[i.owner,i.quarter,(i.start&&i.end)?`${i.start} → ${i.end}`:null].filter(Boolean).join(" · ")||"Click to open the journey →"}</div>
    </div>);};
  return(
    <div style={{padding:"20px 24px 50px"}} className="page-wrap">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}><div><div className="sp-display" style={{fontSize:24,fontWeight:800,color:"var(--sp-brand)",letterSpacing:"-0.2px"}}>Product Pipeline — A to Z</div>
      <div style={{fontSize:13,color:"var(--sp-sub)",marginTop:4,maxWidth:660,lineHeight:1.55}}>Every feature flows through the same journey: captured in <strong>Intake</strong>, evaluated in <strong>Scored</strong>, prepared in <strong>Planned</strong>, executed in <strong>In Build</strong>, delivered in <strong>Done</strong>. Click any card to open its step-by-step journey.</div></div><button onClick={()=>setShowAdd(true)} style={{padding:"9px 20px",borderRadius:10,fontSize:13,fontWeight:800,color:"#fff",background:"#78006E",border:"none",boxShadow:"0 4px 14px rgba(120,0,110,0.28)",whiteSpace:"nowrap"}}>+ Add feature</button></div>
      {/* journey strip */}
      <div style={{display:"flex",alignItems:"stretch",gap:0,margin:"18px 0 14px",overflowX:"auto"}}>
        {STAGES.map((s,i)=>(<Frag key={s.k}>
          <div style={{flex:1,minWidth:150,background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderTop:`3px solid ${s.c}`,borderRadius:12,padding:"11px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:22,height:22,borderRadius:"50%",background:s.c,color:"#fff",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</span>
              <span style={{fontSize:13.5,fontWeight:800,color:"var(--sp-text)"}}>{s.n}</span>
              <span style={{marginLeft:"auto",fontSize:14,fontWeight:800,fontVariantNumeric:"tabular-nums",color:s.c}}>{byStage(s.k).length}</span>
            </div>
            <div style={{fontSize:11,color:"var(--sp-sub)",marginTop:4,lineHeight:1.4}}>{s.d}</div>
          </div>
          {i<STAGES.length-1&&<div style={{display:"flex",alignItems:"center",padding:"0 4px",color:"var(--sp-lineStrong)",fontSize:17,fontWeight:800,flexShrink:0}}>→</div>}
        </Frag>))}
      </div>
      {/* product filter pills */}
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setFP("")} style={{padding:"6px 15px",borderRadius:17,fontSize:12,fontWeight:700,border:`1.5px solid ${!fP?"var(--sp-brand)":"var(--sp-lineStrong)"}`,background:!fP?"var(--sp-brand)":"transparent",color:!fP?"#fff":"var(--sp-sub)"}}>All · {items.length}</button>
        {PRODS.map(pp=>{const n=items.filter(i=>i.pk===pp.key).length;const on=fP===pp.key;return(
          <button key={pp.key} onClick={()=>setFP(f=>f===pp.key?"":pp.key)} style={{padding:"6px 15px",borderRadius:17,fontSize:12,fontWeight:700,border:`1.5px solid ${on?pp.color:"var(--sp-lineStrong)"}`,background:on?pp.color:"transparent",color:on?"#fff":"var(--sp-sub)",display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,borderRadius:"50%",background:on?"#fff":pp.color}}/>{pp.label} · {n}</button>);})}
      </div>
      {/* board */}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${STAGES.length},minmax(200px,1fr))`,gap:11,overflowX:"auto",alignItems:"start"}}>
        {STAGES.map(s=>{const ci=byStage(s.k);return(
          <div key={s.k} style={{background:"var(--sp-surface2)",border:"1.5px solid var(--sp-line)",borderRadius:13,overflow:"hidden",minWidth:200}}>
            <div style={{padding:"9px 13px",background:s.c+"1A",borderBottom:`2px solid ${s.c}55`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12.5,fontWeight:800,color:s.c}}>{s.n}</span>
              <span style={{fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums",color:s.c,background:"var(--sp-surface)",padding:"1px 8px",borderRadius:8}}>{ci.length}</span>
            </div>
            <div style={{padding:9,minHeight:110}}>
              {ci.map(i=><Card key={i.id} i={i}/>)}
              {ci.length===0&&<div style={{fontSize:11.5,color:"var(--sp-faint)",textAlign:"center",padding:"20px 8px",lineHeight:1.5}}>{HINT[s.k]}</div>}
            </div>
          </div>);})}
      </div>
      {showAdd&&addRM&&<AddFeatureModal prodKeys={(products||[]).map(p=>p.key)} defaultProduct={fP||(products||[])[0]?.key} accent="#78006E" onClose={()=>setShowAdd(false)} onCreate={(pk,feat,openAfter)=>{addRM(pk,feat);setShowAdd(false);if(openAfter&&openFeature)openFeature(pk,feat.id);}}/>}
    </div>
  );
}

/* ─── TRACK — EXECUTION VIEW ─────────────────────────────────────────────── */
function TrackView({roadmap,activities,updRM,setActivities,openFeature}){
  const today=new Date();today.setHours(0,0,0,0);
  const dt=s=>{if(!s)return null;const d=new Date(s);return isNaN(d.getTime())?null:d;};
  const items=useMemo(()=>{let r=[];Object.keys(roadmap).forEach(pk=>(roadmap[pk]||[]).forEach(i=>r.push({...i,pk})));return r;},[roadmap]);
  const inBuild=items.filter(i=>i.status==="In Progress");
  const blockedF=items.filter(i=>i.status==="Blocked");
  const blockedA=activities.filter(a=>a.status==="Blocked");
  const overdue=items.filter(i=>i.status!=="Done"&&dt(i.end)&&dt(i.end)<today);
  const dueSoon=items.filter(i=>i.status!=="Done"&&dt(i.end)&&dt(i.end)>=today&&(dt(i.end)-today)/864e5<=14);
  const actLive=activities.filter(a=>a.status==="In Progress");
  const doneF=items.filter(i=>i.status==="Done");
  const upNext=items.filter(i=>["Backlog","Design"].includes(i.status)&&isPart(i.answers)).sort((a,b)=>finalScore(b.answers)-finalScore(a.answers)).slice(0,6);
  const timePct=i=>{const s=dt(i.start),e=dt(i.end);if(!s||!e||e<=s)return null;return Math.max(0,Math.round((today-s)/(e-s)*100));};
  const updA=(id,ch)=>setActivities(p=>p.map(a=>a.id===id?{...a,...ch,updated:now()}:a));
  const KPIS=[
    {v:inBuild.length,l:"IN BUILD",c:"#FA783C"},
    {v:blockedF.length+blockedA.length,l:"BLOCKED",c:"#FF4664"},
    {v:overdue.length,l:"OVERDUE",c:"#FF4664"},
    {v:dueSoon.length,l:"DUE ≤ 14 DAYS",c:"#64A0DC"},
    {v:actLive.length,l:"ACTIVITIES LIVE",c:"#646EC8"},
    {v:doneF.length,l:"DONE",c:"#3CA06E"},
  ];
  const SEC=({icon,t,c,children})=>(
    <div style={{marginTop:22}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{width:24,height:24,borderRadius:7,background:c,color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</span>
        <span style={{fontSize:12,fontWeight:800,letterSpacing:"1.3px",textTransform:"uppercase",color:c}}>{t}</span>
      </div>
      {children}
    </div>);
  const FRow=({i,showTime})=>{const P=PM[i.pk]||{color:"#A5A5A5",light:"#A5A5A51C",label:i.pk||"—"};const pr=subProg(i);const tp=showTime?timePct(i):null;const late=dt(i.end)&&dt(i.end)<today&&i.status!=="Done";return(
    <div onClick={()=>openFeature(i.pk,i.id)} className="sp-card" style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderLeft:`4px solid ${late?"#FF4664":P?.color||"#78006E"}`,borderRadius:12,padding:"12px 15px",marginBottom:8,cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
        <span style={{fontSize:10.5,fontWeight:700,color:P?.color,background:P?.light,padding:"2px 8px",borderRadius:5,border:`1px solid ${P?.color}33`}}>{P?.label}</span>
        <span style={{fontSize:13,fontWeight:700,color:"var(--sp-text)",flex:1,minWidth:150}}>{i.name}</span>
        {late&&<span style={{fontSize:10,fontWeight:800,color:"#FF4664",background:"#FF46641C",padding:"2px 8px",borderRadius:5}}>OVERDUE</span>}
        <select onClick={e=>e.stopPropagation()} value={i.status} onChange={e=>updRM(i.pk,i.id,{status:e.target.value,updated:now()})} style={{...SEL,fontSize:11.5,padding:"4px 8px"}}>{ST.map(s=><option key={s}>{s}</option>)}</select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:9}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.6px",color:"var(--sp-sub)",marginBottom:3}}>WORK — SUB-TASKS {pr!==null?`${pr}%`:""}</div>
          <div style={{height:7,background:"var(--sp-surface3)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pr||0}%`,background:pr===100?"#3CA06E":"#64A0DC",borderRadius:4,transition:"width .3s"}}/></div>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.6px",color:"var(--sp-sub)",marginBottom:3}}>TIME {tp!==null?`${Math.min(tp,999)}% ELAPSED`:"— NO DATES"}</div>
          <div style={{height:7,background:"var(--sp-surface3)",borderRadius:4,overflow:"hidden"}}>{tp!==null&&<div style={{height:"100%",width:`${Math.min(100,tp)}%`,background:tp>100?"#FF4664":tp>75?"#FA783C":"#3CA06E",borderRadius:4}}/>}</div>
        </div>
      </div>
      <div style={{fontSize:11,color:"var(--sp-faint)",marginTop:7,fontVariantNumeric:"tabular-nums"}}>{[i.owner&&`👤 ${i.owner}`,(i.start||i.end)&&`📅 ${i.start||"—"} → ${i.end||"—"}`,i.dmEst&&`⏱ DM est: ${i.dmEst}`].filter(Boolean).join("   ")||"Open to add owner, dates & sub-tasks →"}</div>
    </div>);};
  return(
    <div style={{padding:"20px 24px 50px"}} className="page-wrap">
      <div className="sp-display" style={{fontSize:24,fontWeight:800,color:"var(--sp-brand)",letterSpacing:"-0.2px"}}>Track — Execution Room</div>
      <div style={{fontSize:13,color:"var(--sp-sub)",marginTop:4,lineHeight:1.55}}>Live view of what's moving right now: work progress vs time elapsed, blockers, deadlines, and running activities.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:11,marginTop:16}}>
        {KPIS.map(k=>(<div key={k.l} className="sp-card" style={{padding:"15px 17px"}}><div style={{fontSize:27,fontWeight:800,color:k.c,lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{k.v}</div><div style={{fontSize:10,fontWeight:800,letterSpacing:"1.5px",color:"var(--sp-sub)",marginTop:8}}>{k.l}</div></div>))}
      </div>
      {(blockedF.length>0||blockedA.length>0)&&<SEC icon="⛔" t="Blocked — needs action" c="#FF4664">
        {blockedF.map(i=><FRow key={i.id} i={i}/>)}
        {blockedA.map(a=>{const P=PM[a.product];const T=TM[a.type];return(
          <div key={a.id} style={{background:"#FF46640D",border:"1.5px solid #FF466433",borderLeft:"4px solid #FF4664",borderRadius:12,padding:"10px 15px",marginBottom:8,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
            <span style={{width:18,height:18,borderRadius:4,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700}}>{T?.icon||"?"}</span>
            <span style={{fontSize:10.5,fontWeight:700,color:P?.color,background:P?.light,padding:"2px 8px",borderRadius:5}}>{P?.label}</span>
            <span style={{fontSize:12.5,fontWeight:600,color:"var(--sp-text)",flex:1,minWidth:140}}>{a.title} <span style={{fontSize:10.5,color:"var(--sp-sub)",fontWeight:500}}>(activity)</span></span>
            <select value={a.status} onChange={e=>updA(a.id,{status:e.target.value})} style={{...SEL,fontSize:11.5,padding:"4px 8px"}}>{ST.map(s=><option key={s}>{s}</option>)}</select>
          </div>);})}
      </SEC>}
      <SEC icon="🔨" t={`In build (${inBuild.length})`} c="#FA783C">
        {inBuild.length===0&&<div style={{fontSize:12.5,color:"var(--sp-faint)",padding:"6px 2px"}}>Nothing in build — move a Planned feature to "In Progress" to start tracking it here.</div>}
        {inBuild.map(i=><FRow key={i.id} i={i} showTime/>)}
      </SEC>
      <SEC icon="⏭" t="Up next — highest scored, not started" c="#646EC8">
        {upNext.length===0&&<div style={{fontSize:12.5,color:"var(--sp-faint)",padding:"6px 2px"}}>Score features in the backlogs to build the queue.</div>}
        {upNext.map(i=><FRow key={i.id} i={i}/>)}
      </SEC>
      {actLive.length>0&&<SEC icon="⚡" t={`Activities in motion (${actLive.length})`} c="#64A0DC">
        {actLive.map(a=>{const P=PM[a.product];const T=TM[a.type];return(
          <div key={a.id} style={{background:"var(--sp-surface)",border:"1.5px solid var(--sp-line)",borderLeft:`4px solid ${T?.color||"#646EC8"}`,borderRadius:12,padding:"10px 15px",marginBottom:8,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
            <span style={{width:18,height:18,borderRadius:4,background:T?.color||"#646EC8",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700}}>{T?.icon||"?"}</span>
            <span style={{fontSize:10.5,fontWeight:700,color:P?.color,background:P?.light,padding:"2px 8px",borderRadius:5}}>{P?.label}</span>
            <span style={{fontSize:12.5,fontWeight:600,color:"var(--sp-text)",flex:1,minWidth:140}}>{a.title}</span>
            <span style={{fontSize:11,color:"var(--sp-faint)",fontVariantNumeric:"tabular-nums"}}>{(a.start||a.end)?`${a.start||"—"} → ${a.end||"—"}`:""}</span>
            <select value={a.status} onChange={e=>updA(a.id,{status:e.target.value})} style={{...SEL,fontSize:11.5,padding:"4px 8px"}}>{ST.map(s=><option key={s}>{s}</option>)}</select>
          </div>);})}
      </SEC>}
      {doneF.length>0&&<SEC icon="✓" t={`Done (${doneF.length})`} c="#3CA06E">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:8}}>
          {doneF.map(i=>{const P=PM[i.pk];return(

const BRAND_SWATCHES=["#78006E","#646EC8","#64A0DC","#FA783C","#FF4664","#3CA06E","#46C8A0","#4B4B4B"];
function ProductsPage({products,setProducts,roadmap,setRoadmap,activities,setActivities}){
  const updP=(key,ch)=>setProducts(ps=>ps.map(p=>p.key===key?{...p,...ch,_recovered:false,...(ch.color?{light:ch.color+"1C"}:{})}:p));

        </div>
        <button onClick={addP} style={{padding:"9px 20px",borderRadius:10,fontSize:13,fontWeight:700,color:"#fff",background:"var(--sp-brand)",border:"none",boxShadow:"0 4px 14px rgba(120,0,110,0.28)"}}>+ Add product</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14,marginTop:18}}>

              <span style={{width:13,height:13,borderRadius:"50%",background:pp.color,flexShrink:0}}/>

              {pp._recovered&&<span title="Auto-recovered from sheet data. Click × once you rename it." style={{fontSize:9.5,fontWeight:800,letterSpacing:"0.5px",color:"#FA783C",background:"#FA783C1C",padding:"3px 8px",borderRadius:8,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:6}}>RECOVERED <span onClick={()=>updP(pp.key,{_recovered:false})} style={{cursor:"pointer",fontSize:11,fontWeight:900}}>×</span></span>}
              {pp.key==="txs"&&<span style={{fontSize:9.5,fontWeight:800,letterSpacing:"0.5px",color:"#3CA06E",background:"#3CA06E1C",padding:"3px 8px",borderRadius:8,whiteSpace:"nowrap"}}>OWN BACKLOG</span>}
            </div>
            <textarea defaultValue={pp.desc||""} onBlur={e=>updP(pp.key,{desc:e.target.value})} placeholder="Description…" style={{marginTop:10,minHeight:52,background:"var(--sp-surface2)",border:"1.5px solid var(--sp-line)",fontSize:12}}/>
            <div style={{fontSize:10.5,fontWeight:800,letterSpacing:"1px",color:"var(--sp-sub)",margin:"11px 0 6px"}}>BRAND COLOR</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {BRAND_SWATCHES.map(c=>(

              ))}
            </div>
            <div style={{display:"flex",gap:7,marginTop:13,alignItems:"center"}}>
              <span style={{fontSize:11.5,fontWeight:700,fontVariantNumeric:"tabular-nums",color:pp.color,background:pp.light,padding:"3px 10px",borderRadius:10}}>{nf} features</span>
              <span style={{fontSize:11.5,fontWeight:700,fontVariantNumeric:"tabular-nums",color:"var(--sp-sub)",background:"var(--sp-surface2)",padding:"3px 10px",borderRadius:10}}>{na} activities</span>
              <button onClick={()=>delP(pp.key)} disabled={products.length<=1} style={{marginLeft:"auto",padding:"5px 13px",borderRadius:8,fontSize:11.5,fontWeight:700,color:"#FF4664",background:"#FF46641C",border:"1.5px solid #FF466444",opacity:products.length<=1?0.4:1}}>Delete</button>

    </div>
  );
