                      {editing
                        ?<Frag>
                           <input value={m.v} placeholder="Value" onChange={e=>upd({data:d.map((x,ix)=>ix===i?{...x,v:e.target.value}:x)})} style={{...inp,fontWeight:800,fontSize:17}}/>
                           <input value={m.l} placeholder="Label" onChange={e=>upd({data:d.map((x,ix)=>ix===i?{...x,l:e.target.value}:x)})} style={{...inp,marginTop:6,fontSize:11.5}}/>
                           <span onClick={()=>upd({data:d.filter((_,ix)=>ix!==i)})} style={{position:"absolute",top:6,right:9,cursor:"pointer",color:"var(--sp-down)",fontWeight:800}}>×</span>
                         </Frag>
                        :<Frag>
                           <div style={{fontSize:22,fontWeight:800,color:"var(--sp-text)",lineHeight:1}}>{m.v||"—"}</div>
                           <div style={{fontSize:11.5,color:"var(--sp-sub)",marginTop:6}}>{m.l}</div>
                         </Frag>}
                    </div>
                  ))}
                  {editing&&<div onClick={()=>upd({data:[...d,{v:"",l:""}]})} style={{border:"1.5px dashed var(--sp-lineStrong)",borderRadius:12,padding:"14px 16px",fontSize:13,fontWeight:700,color:"var(--sp-sub)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+ Metric</div>}
                </div>

                {/* ACHIEVEMENTS */}
                <SEC t="Achievements"/>
                {ach.length===0&&!editing&&<div style={{fontSize:13,color:"var(--sp-faint)"}}>No achievements logged yet.</div>}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {ach.map((a,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--sp-surface2)",border:"1px solid var(--sp-line)",borderRadius:10,padding:"10px 14px"}}>
                      <span style={{color:"#3CA06E",fontWeight:800,flexShrink:0}}>✓</span>
                      {editing
                        ?<Frag>
                           <input value={a} onChange={e=>upd({achievements:ach.map((x,ix)=>ix===i?e.target.value:x)})} style={{...inp,border:"none",background:"transparent",padding:0}}/>
                           <span onClick={()=>upd({achievements:ach.filter((_,ix)=>ix!==i)})} style={{cursor:"pointer",color:"var(--sp-down)",fontWeight:800}}>×</span>
                         </Frag>
                        :<span style={{fontSize:13.5,color:"var(--sp-text)"}}>{a}</span>}
                    </div>
                  ))}
                  {editing&&<div onClick={()=>upd({achievements:[...ach,""]})} style={{border:"1.5px dashed var(--sp-lineStrong)",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,color:"var(--sp-sub)",cursor:"pointer",textAlign:"center"}}>+ Achievement</div>}
                </div>

                {/* PROJECTS */}
                <SEC t="Projects"/>
                {prj.length===0&&!editing&&<div style={{fontSize:13,color:"var(--sp-faint)"}}>No projects yet.</div>}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {prj.map((pr,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--sp-surface2)",border:"1px solid var(--sp-line)",borderRadius:10,padding:"10px 14px",flexWrap:"wrap"}}>
                      {editing
                        ?<Frag>
                           <input value={pr.name} placeholder="Project name" onChange={e=>upd({projects:prj.map((x,ix)=>ix===i?{...x,name:e.target.value}:x)})} style={{...inp,flex:"1 1 180px"}}/>
                           <input value={pr.quarter||""} placeholder="Quarter" onChange={e=>upd({projects:prj.map((x,ix)=>ix===i?{...x,quarter:e.target.value}:x)})} style={{...inp,width:110,flex:"0 0 auto"}}/>
                           <select value={pr.status} onChange={e=>upd({projects:prj.map((x,ix)=>ix===i?{...x,status:e.target.value}:x)})} style={{flex:"0 0 auto"}}>
                             {Object.keys(PJST).map(s=><option key={s}>{s}</option>)}
                           </select>
                           <span onClick={()=>upd({projects:prj.filter((_,ix)=>ix!==i)})} style={{cursor:"pointer",color:"var(--sp-down)",fontWeight:800}}>×</span>
                         </Frag>
                        :<Frag>
                           <span style={{fontSize:13.5,fontWeight:600,color:"var(--sp-text)",flex:1}}>{pr.name}</span>
                           {pr.quarter&&<span style={{fontSize:12,color:"var(--sp-sub)"}}>{pr.quarter}</span>}
                           <span style={{fontSize:11,fontWeight:800,color:"#fff",background:PJST[pr.status]||"#A5A5A5",padding:"3px 11px",borderRadius:12}}>{pr.status}</span>
                         </Frag>}
                    </div>
                  ))}
                  {editing&&<div onClick={()=>upd({projects:[...prj,{name:"",quarter:"",status:"Planned"}]})} style={{border:"1.5px dashed var(--sp-lineStrong)",borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,color:"var(--sp-sub)",cursor:"pointer",textAlign:"center"}}>+ Project</div>}
                </div>


              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxBpxqpjmnrQx5hne2giBXPvF8Pr_CDqqKwstcp1tgmbQp0xTtYOZECM0vinOoaDK-o/exec";

const NavIcon=({k})=>{
  const s={width:21,height:21,display:"block"};
  const p={fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"};
  switch(k){
    case "dashboard":return(<svg style={s} viewBox="0 0 24 24"><rect {...p} x="3" y="3" width="7.5" height="7.5" rx="1.5"/><rect {...p} x="13.5" y="3" width="7.5" height="7.5" rx="1.5"/><rect {...p} x="3" y="13.5" width="7.5" height="7.5" rx="1.5"/><rect {...p} x="13.5" y="13.5" width="7.5" height="7.5" rx="1.5"/></svg>);
    case "summary":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M6 3h9l4 4v14H6z"/><path {...p} d="M9 11h7M9 15h7"/></svg>);
    case "roadmap":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path {...p} d="M9 4v14M15 6v14"/></svg>);
    case "activities":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M4 6.5 5.5 8 8.5 5"/><path {...p} d="M4 12.5 5.5 14 8.5 11"/><path {...p} d="M4 18.5 5.5 20 8.5 17"/><path {...p} d="M11.5 6.5H20M11.5 12.5H20M11.5 18.5H20"/></svg>);
    case "backlog-sp":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M12 3 3 8l9 5 9-5-9-5z"/><path {...p} d="M3 13l9 5 9-5"/></svg>);
    case "backlog-txs":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M4 8h13M17 8l-3-3M17 8l-3 3"/><path {...p} d="M20 16H7M7 16l3-3M7 16l3 3"/></svg>);
    case "pipeline":return(<svg style={s} viewBox="0 0 24 24"><circle {...p} cx="4.5" cy="12" r="2.1"/><circle {...p} cx="12" cy="12" r="2.1"/><circle {...p} cx="19.5" cy="12" r="2.1"/><path {...p} d="M6.8 12h3M14.3 12h3"/><path {...p} d="M4.5 9.9V6h15v3.9M4.5 14.1V18h15v-3.9" opacity="0.45"/></svg>);
    case "products":return(<svg style={s} viewBox="0 0 24 24"><path {...p} d="M12 3 4 7.2v9.6L12 21l8-4.2V7.2L12 3z"/><path {...p} d="M4 7.2l8 4.2 8-4.2M12 11.4V21"/></svg>);
    default:return(<svg style={s} viewBox="0 0 24 24"><circle {...p} cx="12" cy="12" r="8"/></svg>);
  }
};

function App(){
  const[authed,setAuthed]=useState(()=>sessionStorage.getItem("sp_auth")==="1");
  const[tab,setTab]=useState("dashboard");
  const[theme,setTheme]=useState(()=>localStorage.getItem("sp_theme")||"light");
  useEffect(()=>{localStorage.setItem("sp_theme",theme);},[theme]);
  const[roadmap,setRoadmap]=useState(INIT_ROADMAP);
  const[activities,setActivities]=useState(INIT_ACTIVITIES);
  const[dashboard,setDashboard]=useState(INIT_DASHBOARD);
  const[portfolio,setPortfolio]=useState(DEFAULT_PORTFOLIO);
  const[products,setProducts]=useState(DEFAULT_PRODS);
  const[drawer,setDrawer]=useState(null);
  const openFeature=useCallback((pk,id)=>setDrawer({pk,id}),[]);
  const[loading,setLoading]=useState(true);
  const[loadError,setLoadError]=useState(null);
  const[syncStatus,setSyncStatus]=useState("idle");
  const saveTimer=useRef(null);
  const isFirstLoad=useRef(true);
  syncCatalog(products);

  useEffect(()=>{
    if(!authed){setLoading(false);return;}
    setLoading(true);setLoadError(null);
    let done=false;
    /* 12-second timeout so we never get stuck on the purple loading screen. */
    const timeout=setTimeout(()=>{
      if(done)return;done=true;
      console.warn("[Saudi Partner] Sheets load timed out after 12s — using defaults.");
      setLoadError("Timed out fetching data from Google Sheets after 12s. Showing default data. Save is disabled until you reconnect.");
      setLoading(false);
    },12000);
    const finish=(err)=>{
      if(done)return;done=true;clearTimeout(timeout);
      if(err){console.error("[Saudi Partner] Load failed:",err);setLoadError(`Failed to load from Google Sheets: ${err.message||err}. Showing default data. Save is disabled until you reconnect.`);}
      setLoading(false);
    };
    fetch(`${SHEETS_URL}?action=read`)
      .then(r=>r.json())
      .then(data=>{
        try{
          if(data.error){console.error("Sheets error:",data.error);setLoadError(`Google Sheets returned an error: ${data.error}`);finish();return;}
          if(data.roadmap&&typeof data.roadmap==="object"&&!Array.isArray(data.roadmap)&&Object.keys(data.roadmap).length>0){
            const m={...INIT_ROADMAP};
            Object.keys(data.roadmap).forEach(pk=>{if(Array.isArray(data.roadmap[pk])&&data.roadmap[pk].length>0)m[pk]=data.roadmap[pk].map(sanitizeFeature);});
            setRoadmap(m);
          }
          /* Reconcile products: recover any product keys referenced in roadmap/activities
             that are missing from the loaded product catalog. */
          try{
            const raw=(Array.isArray(data.products)&&data.products.length)?data.products:(data.portfolio&&Array.isArray(data.portfolio.catalog)&&data.portfolio.catalog);
            let list=(Array.isArray(raw)&&raw.length?raw:DEFAULT_PRODS).map(c=>({light:((c&&c.color)||"#78006E")+"1C",...c}));
            const known=new Set(list.map(p=>p&&p.key).filter(Boolean));
            const rmKeys=(data.roadmap&&typeof data.roadmap==="object")?Object.keys(data.roadmap).filter(k=>Array.isArray(data.roadmap[k])&&data.roadmap[k].length>0):[];
            const actKeys=Array.isArray(data.activities)?data.activities.map(a=>a&&a.product).filter(Boolean):[];
            const orphans=[...new Set([...rmKeys,...actKeys])].filter(k=>!known.has(k));
            if(orphans.length){
              const RC=["#646EC8","#64A0DC","#46C8A0","#FA783C","#FF4664","#3CA06E","#78006E"];
              const shadows=orphans.map((k,i)=>{const color=RC[i%RC.length];return{key:k,label:`Recovered Product ${i+1}`,color,light:color+"1C",desc:"Auto-recovered from sheet data — rename & recolor from the Products page.",_recovered:true};});
              list=[...list,...shadows];
              console.info(`[Saudi Partner] Recovered ${orphans.length} orphan product key(s):`,orphans);
            }
            setProducts(list);
          }catch(e){console.warn("[Saudi Partner] Product reconciliation skipped:",e);}
          if(Array.isArray(data.activities)&&data.activities.length>0)setActivities(data.activities.map(sanitizeActivity));
          if(Array.isArray(data.dashboard)&&data.dashboard.length>0){
            const nd=INIT_DASHBOARD.map((def,i)=>({...def,...(data.dashboard[i]||{})}));
            setDashboard(nd);
          }
          if(data.portfolio&&Array.isArray(data.portfolio.products)){
            try{
              const merged={...DEFAULT_PORTFOLIO,...data.portfolio};
              merged.products=data.portfolio.products.map(sp=>{
                const def=DEFAULT_PORTFOLIO.products.find(d=>d.id===sp.id)||{};
                return {...def,...sp,start:sp.start||def.start,end:sp.end||def.end,link:sp.link||def.link};
              });
              merged.start=data.portfolio.start||DEFAULT_PORTFOLIO.start;
              merged.end=data.portfolio.end||DEFAULT_PORTFOLIO.end;
              setPortfolio(merged);
            }catch(e){console.warn("[Saudi Partner] Portfolio skipped:",e);}
          }
          finish();
        }catch(e){finish(e);}
      })
      .catch(err=>finish(err));
    return()=>{clearTimeout(timeout);done=true;};
  },[authed]);

  useEffect(()=>{
    if(!authed)return;
    if(isFirstLoad.current){isFirstLoad.current=false;return;}
    setSyncStatus("saving");
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      fetch(SHEETS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({roadmap,activities,dashboard,portfolio:{...portfolio,catalog:products.map(({_recovered,light,...p})=>p)},products:products.map(({_recovered,light,...p})=>p)})})
      .then(r=>r.json())
      .then(d=>{if(d.success){setSyncStatus("saved");setTimeout(()=>setSyncStatus("idle"),2500);}else{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);}})
      .catch(()=>{setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);});
    },2500);
  },[roadmap,activities,dashboard,portfolio,products]);

  const updRM=useCallback((pk,id,ch)=>setRoadmap(p=>({...p,[pk]:p[pk].map(i=>i.id===id?{...i,...ch}:i)})),[]);
  const delRM=useCallback((pk,id)=>setRoadmap(p=>({...p,[pk]:p[pk].filter(i=>i.id!==id)})),[]);
  const addRM=useCallback((pk,preset)=>setRoadmap(p=>({...p,[pk]:[...(p[pk]||[]),preset||{...mkI(uid(),"New Feature"),updated:now()}]})),[]);
  const moveRM=useCallback((pk,id,newPk)=>setRoadmap(p=>{const it=(p[pk]||[]).find(x=>x.id===id);if(!it||pk===newPk)return p;return{...p,[pk]:p[pk].filter(x=>x.id!==id),[newPk]:[...(p[newPk]||[]),it]};}),[]);

  const exportCSV=()=>{
    const rows=[["Tab","Product","Feature/Activity","Score","Priority","Status","Quarter","Start","End","Owner","Jira","DM Estimation","Sub-tasks","Notes","Updated"]];
    Object.keys(roadmap).forEach(pk=>{roadmap[pk].forEach(i=>{const sc=isPart(i.answers)?finalScore(i.answers).toFixed(1):"";const pr=sc?priOf(parseFloat(sc)).l:"";const st=i.subtasks||[];rows.push(["Backlog",PM[pk]?.label,i.name,sc,pr,i.status,i.quarter,i.start||"",i.end||"",i.owner||"",i.jira||"",i.dmEst||"",st.length?`${st.filter(s=>s.done).length}/${st.length} done`:"",(i.notes||"").replace(/\n/g," "),i.updated||""]);});});
    activities.forEach(a=>rows.push(["Activities",PM[a.product]?.label,a.title,"","",a.status,"",a.start||"",a.end||"",a.owner||"","","",(a.linkedFeatures||[]).length?`Linked: ${(a.linkedFeatures||[]).length} feature(s)`:"",[(a.notes||""),(a.deliverables?`Deliverables: ${a.deliverables}`:"")].filter(Boolean).join(" | ").replace(/\n/g," "),a.updated||""]));
    const drows=[["Month","Suppliers","Distributors","Aggregators","Businesses in Directory","Users Signed Up","CSAT","Activation Rate","Engagement Rate","Notes"]];
    dashboard.forEach(d=>{drows.push([d.month,d.suppliers,d.distributors,d.aggregators,d.directoryBusinesses,d.usersSignedUp,d.csat,d.activationRate,d.engagementRate,(d.notes||"")]);});
    const csv=[...rows,...drows].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const el=document.createElement("a");el.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);el.download=`sp-tracker-${new Date().toISOString().slice(0,10)}.csv`;el.click();
  };

  if(!authed)return <LoginScreen onLogin={()=>setAuthed(true)}/>;

  if(loading){
    return(
      <div style={{minHeight:"100vh",background:"#78006E",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
        <img src={"data:image/png;base64,"+ASSET_LOGO_DARK} alt="Saudi Partner" style={{height:90}}/>
        <div style={{fontSize:16,color:"rgba(255,255,255,0.5)",fontWeight:500}}>Loading from Google Sheets...</div>
      </div>
    );
  }

  const totalFeat=Object.values(roadmap).reduce((a,arr)=>a+arr.length,0);
  const totalScored=Object.values(roadmap).reduce((a,arr)=>a+arr.filter(i=>isFull(i.answers)).length,0);
  const scoredRM=Object.values(roadmap).reduce((a,arr)=>a+arr.filter(i=>isPart(i.answers)).length,0);
  const dashFilled=dashboard.filter(d=>d.suppliers||d.usersSignedUp||d.csat||d.engagementRate).length;

  const SP_KEYS=products.filter(p=>p.key!=="txs").map(p=>p.key);
  const spCount=SP_KEYS.reduce((a,k)=>a+(roadmap[k]||[]).length,0);
  const hasTxs=products.some(p=>p.key==="txs");
  const TABS=[
    {key:"dashboard",  label:"Dashboard",  color:"#78006E",badge:dashFilled>0?`${dashFilled}/12`:null},
    {key:"pipeline",   label:"Pipeline — full journey A→Z",color:"#646EC8",badge:totalFeat},
    {key:"summary",    label:"Summary",    color:"var(--sp-text)"},
    {key:"roadmap",    label:"Roadmap",    color:"#646EC8",badge:scoredRM+activities.length},
    {key:"activities", label:"Activities", color:"#64A0DC",badge:activities.length},
    {key:"sep",sep:true},
    {key:"backlog-sp", label:"Saudi Partner Backlog",    color:"#78006E",badge:spCount},
    ...(hasTxs?[{key:"backlog-txs",label:"Tourism Exchange Backlog", color:"#3CA06E",badge:(roadmap.txs||[]).length}]:[]),
    {key:"sep2",sep:true},
    {key:"products",   label:"Products — edit catalog",color:"#4B4B4B"},
  ];

  const syncBadge=syncStatus==="saving"?{text:"Syncing...",fg:"#FA783C",bg:"#FA783C1C",bd:"#FA783C55"}
    :syncStatus==="saved"?{text:"✓ Synced",fg:"#3CA06E",bg:"#3CA06E1C",bd:"#3CA06E55"}
    :syncStatus==="error"?{text:"Sync failed",fg:"#FF4664",bg:"#FF46641C",bd:"#FF466455"}:null;

  return(
    <div className={theme==="dark"?"theme-dark":"theme-light"} style={{background:"var(--sp-bg)",minHeight:"100vh",color:"var(--sp-text)"}}>
      {/* Header */}
      <div style={{background:"var(--sp-headerBg)",borderBottom:"1px solid var(--sp-headerLine)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 28px",height:70,gap:16,boxShadow:"0 2px 14px rgba(42,7,38,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:18,minWidth:0}}>
          <img src={"data:image/png;base64,"+ASSET_LOGO_DARK} alt="Saudi Partner" style={{height:46,flexShrink:0}}/>
          <div style={{width:1,height:28,background:"var(--sp-headerLine)"}}/>
          <div style={{minWidth:0}}>
            <div className="sp-display" style={{fontSize:16,fontWeight:800,color:"var(--sp-headerText)",letterSpacing:"0.1px",whiteSpace:"nowrap"}}>Product Tracker</div>
            <div style={{fontSize:11.5,color:"var(--sp-headerSub)",fontWeight:600,marginTop:1,whiteSpace:"nowrap"}}>Smart Tourism · 2026</div>
          </div>
          <div style={{display:"flex",gap:16,marginLeft:6}}>
            {[{v:totalFeat,l:"Features"},{v:totalScored,l:"Scored"},{v:activities.length,l:"Activities"}].map(s=>(
              <div key={s.l} style={{textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:800,color:"var(--sp-headerText)",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{s.v}</div>
                <div style={{fontSize:10.5,color:"var(--sp-headerSub)",marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          {syncBadge&&<span style={{fontSize:12,fontWeight:600,color:syncBadge.fg,background:syncBadge.bg,padding:"6px 14px",borderRadius:8,border:`1.5px solid ${syncBadge.bd}`}}>{syncBadge.text}</span>}
          <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title="Toggle light / dark mode"
            style={{width:38,height:38,borderRadius:10,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",border:"1.5px solid rgba(255,255,255,0.30)",background:"rgba(255,255,255,0.12)",color:"#fff"}}>
            {theme==="dark"?"☀":"🌙"}
          </button>
          <button onClick={()=>{sessionStorage.removeItem("sp_auth");setAuthed(false);}} style={{padding:"8px 14px",borderRadius:9,fontSize:12,fontWeight:600,color:"#fff",background:"rgba(255,255,255,0.10)",border:"1.5px solid rgba(255,255,255,0.30)"}}>Sign out</button>
          <button onClick={exportCSV} style={{padding:"8px 18px",borderRadius:9,fontSize:13,fontWeight:700,color:"var(--sp-brand)",background:"#fff",border:"none",boxShadow:"0 2px 10px rgba(0,0,0,0.18)"}}>⬇ CSV</button>
        </div>
      </div>
      {loadError&&(
        <div style={{padding:"9px 20px",background:"#FA783C",color:"#fff",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:12,borderBottom:"2px solid #C55A22"}}>
          <span style={{fontSize:16}}>⚠️</span>
          <span style={{flex:1,lineHeight:1.5}}>{loadError}</span>
          <button onClick={()=>window.location.reload()} style={{padding:"5px 14px",borderRadius:8,background:"#fff",color:"#FA783C",fontSize:12,fontWeight:800,border:"none"}}>Retry</button>
          <button onClick={()=>setLoadError(null)} title="Dismiss" style={{width:26,height:26,borderRadius:7,background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:14,fontWeight:800,border:"1.5px solid rgba(255,255,255,0.4)"}}>×</button>
        </div>
      )}
      {/* Brand strip */}
      <div style={{height:10,backgroundImage:`url(data:image/png;base64,${ASSET_STRIP})`,backgroundSize:"auto 100%",backgroundRepeat:"repeat-x"}}/>
      {/* Sidebar + Page */}
      <div style={{display:"flex",alignItems:"stretch"}}>
        {/* Side navigation — icons only, names on hover */}
        <div style={{width:70,flexShrink:0,background:"var(--sp-headerBg)",borderRight:"1px solid var(--sp-headerLine)",
          position:"sticky",top:0,alignSelf:"flex-start",height:"100vh",display:"flex",flexDirection:"column",zIndex:40}}>
          <div style={{flex:1,padding:"16px 0",display:"flex",flexDirection:"column",alignItems:"center"}}>
            {TABS.map(t=>{
              if(t.sep)return <div key={t.key} style={{width:32,height:1.5,background:"var(--sp-headerLine)",margin:"10px 0 14px",borderRadius:1}}/>;
              const active=tab===t.key;
              return(
                <div key={t.key} className="nav-item" onClick={()=>setTab(t.key)}
                  style={{width:46,height:46,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",
                    marginBottom:7,cursor:"pointer",userSelect:"none",transition:"all 0.15s",
                    background:active?"rgba(255,255,255,0.16)":"transparent",
                    color:active?"#fff":"var(--sp-tabIdle)",
                    boxShadow:active?"inset 0 0 0 1.5px rgba(255,255,255,0.35)":"none"}}>
                  <NavIcon k={t.key}/>
                  {t.badge!=null&&t.badge!==""&&t.badge!==0&&
                    <span style={{position:"absolute",top:2,right:2,minWidth:16,height:15,padding:"0 4px",borderRadius:8,background:"#fff",color:"var(--sp-brand)",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>{t.badge}</span>}
                  <span className="nav-tip">{t.label}</span>
                </div>);
            })}
          </div>
        </div>
        {/* Page */}
        <div className="page-wrap" style={{flex:1,minWidth:0}}>
        <SPErrorBoundary key={tab}>
        {tab==="dashboard"   &&<DashboardTab dashboard={dashboard} setDashboard={setDashboard} theme={theme} pf={portfolio} setPf={setPortfolio} roadmap={roadmap} activities={activities} setTab={setTab}/>}
        {tab==="summary"     &&<SummaryTab    roadmap={roadmap} activities={activities}/>}
        {tab==="roadmap"     &&<RoadmapTab    roadmap={roadmap} activities={activities} updRM={updRM}/>}
        {tab==="activities"  &&<ActivitiesTab activities={activities} setActivities={setActivities} roadmap={roadmap}/>}
        {tab==="pipeline"    &&<PipelineView roadmap={roadmap} openFeature={openFeature} addRM={addRM} products={products}/>}
        {tab==="products"    &&<ProductsPage products={products} setProducts={setProducts} roadmap={roadmap} setRoadmap={setRoadmap} activities={activities} setActivities={setActivities}/>}
        </SPErrorBoundary>
        {(tab==="backlog-sp"||(tab.startsWith("sc-")&&tab!=="sc-txs"))&&
          <ScoringPage prodKeys={SP_KEYS} title="Saudi Partner Backlog" accent="#78006E"
            subtitle="Combined feature backlog across Visual Assets, E-Learning, K&R, SSID, and Home Page — scored, prioritized, and tracked in one place."
            roadmap={roadmap} activities={activities} updRM={updRM} delRM={delRM} addRM={addRM} openFeature={openFeature}/>}
        {(tab==="backlog-txs"||tab==="sc-txs")&&
          <ScoringPage prodKeys={["txs"]} title="Tourism Exchange Backlog" accent="#3CA06E"
            subtitle="Tourism Exchange Saudi feature backlog — scored, prioritized, and tracked separately."
            roadmap={roadmap} activities={activities} updRM={updRM} delRM={delRM} addRM={addRM} openFeature={openFeature}/>}
        </div>
      </div>
      {drawer&&(()=>{let it=null,fpk=null;Object.keys(roadmap).some(k=>{const f=(roadmap[k]||[]).find(x=>x.id===drawer.id);if(f){it=f;fpk=k;return true;}return false;});
        if(!it)return null;
        return <FeatureDrawer item={{...it,pk:fpk}} activities={activities} updRM={updRM} moveRM={moveRM}
          onDelete={()=>{delRM(fpk,it.id);setDrawer(null);}} onClose={()=>setDrawer(null)}/>;})()}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
